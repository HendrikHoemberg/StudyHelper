spring.application.name=StudyHelper

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/studyhelper}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:studyhelper}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:studyhelper}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=32

file.upload.dir=${FILE_UPLOAD_DIR:/app/uploads}

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

spring.ai.google.genai.api-key=${GOOGLE_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite-preview
spring.ai.retry.max-attempts=0

server.servlet.session.timeout=1d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=native

# Initial User Seeding
app.user1.username=${APP_USER1_NAME:}
app.user1.password=${APP_USER1_PASSWORD:}
app.user2.username=${APP_USER2_NAME:}
app.user2.password=${APP_USER2_PASSWORD:}
