<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Study Session')}"></head>
<body>

<div class="app-layout">
    <nav th:replace="~{fragments/layout :: topnav}"></nav>
    <div id="main-content" class="app-main-content">
        <div class="sh-fade-in">
            <div class="sh-dashboard-shell">
                <div class="sh-explorer-shell">
                    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
                    <div id="explorer-detail" class="sh-explorer-detail sh-explorer-detail-content">
                        <div th:switch="${studyStateView}">
                            <div th:case="'card'" th:replace="~{fragments/study-card :: studyCard}"></div>
                            <div th:case="'question'" th:replace="~{fragments/quiz-question :: quizQuestion}"></div>
                            <div th:case="'complete'">
                                <div th:if="${mode == T(com.HendrikHoemberg.StudyHelper.dto.StudyMode).QUIZ}" th:replace="~{fragments/quiz-summary :: quizSummary}"></div>
                                <div th:if="${mode != T(com.HendrikHoemberg.StudyHelper.dto.StudyMode).QUIZ}" th:replace="~{fragments/study-complete :: studyComplete}"></div>
                            </div>
                            <div th:case="*" th:replace="~{fragments/study-setup :: studySetup}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script src="/js/study-wizard.js"></script>
</body>
</html>
