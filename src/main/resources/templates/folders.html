<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Folders — StudyHelper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .folder-card { border-left: 5px solid var(--folder-color); transition: box-shadow .15s; cursor: pointer; }
        .folder-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/folders">StudyHelper</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 small" th:text="'Signed in as ' + ${username}"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="m-0 fw-semibold">My Folders</h4>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newFolderModal">
            + New Folder
        </button>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(folders)}" class="text-center text-muted py-5">
        <p class="mb-1">No folders yet.</p>
        <p class="small">Create a folder to get started.</p>
    </div>

    <!-- Folder grid -->
    <div class="row g-3">
        <div th:each="folder : ${folders}" class="col-12 col-sm-6 col-md-4 col-lg-3">
            <a th:href="@{/folders/{id}(id=${folder.id})}" class="text-decoration-none text-dark">
                <div class="card folder-card shadow-sm rounded-3 p-3"
                     th:style="'--folder-color:' + ${folder.colorHex}">
                    <div class="d-flex align-items-center gap-2">
                        <span class="rounded-circle d-inline-block flex-shrink-0"
                              th:style="'width:14px;height:14px;background:' + ${folder.colorHex}"></span>
                        <span class="fw-semibold text-truncate" th:text="${folder.name}"></span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<!-- New Folder Modal -->
<div class="modal fade" id="newFolderModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">New Folder</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/folders}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" required autofocus>
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Color</label>
                        <input type="color" name="colorHex" class="form-control form-control-color w-100" value="#4c6ef5">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
