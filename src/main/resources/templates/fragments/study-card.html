<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="studyCard" id="study-session-content" class="sh-fade-in sh-study-card-root sh-study-session-active">

    <div th:if="${studyError}" class="sh-alert sh-alert-danger">
        <div class="sh-alert-body" th:text="${studyError}"></div>
        <button type="button" class="sh-alert-close" hx-on:click="this.closest('.sh-alert').remove()">
            <i data-lucide="x"></i>
        </button>
    </div>

    <!-- Progress bar -->
    <div class="sh-study-progress-wrap mb-4">
        <div class="sh-study-progress-label">
            Card <span th:text="${currentCardNumber}">1</span> of <span th:text="${totalCards}">10</span>
            <span th:if="${isDeckByDeck}" style="margin-left:0.5rem;">
                — <span th:text="${currentCard.deckName}" style="color:var(--accent);font-weight:600;">Deck</span>
            </span>
        </div>
        <div class="sh-study-progress-bar-bg">
            <div class="sh-study-progress-bar"
                 th:style="'width:' + ${(totalCards > 0 ? (currentCardNumber * 100.0 / totalCards) : 0)} + '%'"></div>
        </div>
    </div>

    <!-- Flip card -->
    <div class="sh-study-card-shell">
        <div class="sh-flip-container sh-study-flip-container">
            <div class="sh-flip-card sh-study-flip-card" th:data-card-id="${currentCard.cardId}">

                <!-- Front face -->
                <div class="sh-flip-face sh-flip-front">
                    <div class="sh-study-face-content">
                        <div class="sh-flashcard-label" style="margin-bottom:0.75rem;">Question</div>
                        <img th:if="${currentCard.frontImageUrl}" th:src="${currentCard.frontImageUrl}"
                             class="sh-study-card-image sh-lightbox-trigger" alt="Card image">
                        <div th:if="${currentCard.frontText != null and !#strings.isEmpty(currentCard.frontText)}"
                             class="sh-study-face-text" th:text="${currentCard.frontText}">Front text</div>
                    </div>
                    <button type="button" class="sh-btn sh-btn-primary sh-study-reveal-btn"
                            style="min-width:160px;justify-content:center;"
                            onclick="this.closest('.sh-flip-card').classList.add('flipped')">
                        Reveal Answer
                    </button>
                </div>

                <!-- Back face -->
                <div class="sh-flip-face sh-flip-back">
                    <div class="sh-study-face-content">
                        <div class="sh-flashcard-label" style="margin-bottom:0.75rem;">Answer</div>
                        <img th:if="${currentCard.backImageUrl}" th:src="${currentCard.backImageUrl}"
                             class="sh-study-card-image sh-lightbox-trigger" alt="Card image">
                        <div th:if="${currentCard.backText != null and !#strings.isEmpty(currentCard.backText)}"
                             class="sh-study-face-text" th:text="${currentCard.backText}">Back text</div>
                    </div>
                    <div class="sh-study-answer-controls">
                        <form method="post"
                               hx-post="/session/answer"
                               hx-target="#study-session-content"
                               hx-swap="outerHTML swap:500ms">
                            <input type="hidden" name="cardId" th:value="${currentCard.cardId}">
                            <input type="hidden" name="isCorrect" value="true">
                            <button type="submit" class="sh-study-btn-answer sh-study-btn-correct"
                                    title="Correct">
                                <i data-lucide="check"></i>
                            </button>
                        </form>

                        <form method="post"
                               hx-post="/session/answer"
                               hx-target="#study-session-content"
                               hx-swap="outerHTML swap:500ms">
                            <input type="hidden" name="cardId" th:value="${currentCard.cardId}">
                            <input type="hidden" name="isCorrect" value="false">
                            <button type="submit" class="sh-study-btn-answer sh-study-btn-incorrect"
                                    title="Incorrect">
                                <i data-lucide="x"></i>
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Image lightbox -->
    <div id="sh-lightbox" class="sh-lightbox" style="display:none;" onclick="this.style.display='none'">
        <button class="sh-lightbox-close" onclick="document.getElementById('sh-lightbox').style.display='none'">
            <i data-lucide="x"></i>
        </button>
        <img id="sh-lightbox-img" class="sh-lightbox-img" src="" alt="Full size image">
    </div>

    <script>
        (function() {
            document.querySelectorAll('.sh-lightbox-trigger').forEach(function(img) {
                img.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var lb = document.getElementById('sh-lightbox');
                    document.getElementById('sh-lightbox-img').src = img.src;
                    lb.style.display = 'flex';
                });
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') document.getElementById('sh-lightbox').style.display = 'none';
            });
        })();
    </script>

</div>

</body>
</html>
