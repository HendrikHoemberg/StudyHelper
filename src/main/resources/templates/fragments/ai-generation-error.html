<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="aiGenerationError" class="sh-alert sh-alert-danger" data-ai-generation-error="true">
    <div>
        <strong th:text="${aiErrorTitle ?: 'AI generation failed'}">AI generation failed</strong>
        <div class="sh-alert-body" th:text="${aiErrorMessage ?: 'Please try again.'}">Please try again.</div>
    </div>
    <button type="button" class="sh-alert-close" hx-on:click="this.closest('.sh-alert').remove()">
        <iconify-icon icon="lucide:x"></iconify-icon>
    </button>
</div>

</body>
</html>
