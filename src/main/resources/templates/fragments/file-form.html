<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="uploadModal" class="sh-modal is-open">
    <div class="sh-modal-backdrop" onclick="this.closest('.sh-modal').remove()"></div>
    <div class="sh-modal-dialog">
        <div class="sh-modal-content">
            <div class="sh-modal-header">
                <h5 class="sh-modal-title">Upload File</h5>
                <button type="button" class="sh-modal-close" onclick="this.closest('.sh-modal').remove()">
                    <iconify-icon icon="lucide:x"></iconify-icon>
                </button>
            </div>
            <form th:action="@{/folders/{id}/files(id=${folderId})}" method="post"
                  enctype="multipart/form-data">
                <div class="sh-modal-body">
                    <div>
                        <label class="sh-label">File</label>
                        <input type="file" name="file" class="sh-input" required>
                    </div>
                    <p style="color:var(--text-muted); font-size:0.8125rem; margin-top:0.5rem; margin-bottom:0;">
                        Maximum file size: 100 MB</p>
                </div>
                <div class="sh-modal-footer">
                    <button type="button" class="sh-btn sh-btn-secondary" onclick="this.closest('.sh-modal').remove()">Cancel</button>
                    <button type="submit" class="sh-btn sh-btn-primary">Upload</button>
                </div>
            </form>
        </div>
    </div>
    <script>initLucide();</script>
</div>

</body>
</html>
