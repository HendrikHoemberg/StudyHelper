<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="uploadModal" class="sh-modal is-open">
    <div class="sh-modal-backdrop" onclick="this.closest('.sh-modal').remove()"></div>
    <div class="sh-modal-dialog">
        <div class="sh-modal-content">
            <div class="sh-modal-header">
                <h5 class="sh-modal-title">Upload File</h5>
                <button type="button" class="sh-modal-close" onclick="this.closest('.sh-modal').remove()">
                    <iconify-icon icon="lucide:x"></iconify-icon>
                </button>
            </div>
            <form th:action="@{/folders/{id}/files(id=${folderId})}" method="post"
                  enctype="multipart/form-data">
                <div class="sh-modal-body">
                    <div class="sh-upload-field">
                        <input type="file" name="file" id="upload-file-input" class="sh-upload-file-input" required>
                        <button type="button" class="sh-upload-chooser" id="upload-file-chooser">
                            <iconify-icon icon="lucide:upload-cloud"></iconify-icon>
                            <span>Choose file</span>
                        </button>
                        <div class="sh-upload-file-name" id="upload-file-name">No file selected</div>
                    </div>
                    <p class="sh-upload-limit">Maximum file size: 100 MB</p>
                </div>
                <div class="sh-modal-footer">
                    <button type="button" class="sh-btn sh-btn-secondary" onclick="this.closest('.sh-modal').remove()">Cancel</button>
                    <button type="submit" class="sh-btn sh-btn-primary">Upload</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        (function() {
            initLucide();
            var fileInput = document.getElementById('upload-file-input');
            var chooser = document.getElementById('upload-file-chooser');
            var selectedFileName = document.getElementById('upload-file-name');
            if (!fileInput || !chooser || !selectedFileName) return;

            chooser.addEventListener('click', function() {
                fileInput.click();
            });

            fileInput.addEventListener('change', function() {
                selectedFileName.textContent = fileInput.files[0] ? fileInput.files[0].name : 'No file selected';
            });
        })();
    </script>
</div>

</body>
</html>
