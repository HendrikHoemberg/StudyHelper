<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Fragment: children of a folder in the explorer tree -->
<div th:fragment="folderChildren">

    <!-- Subfolders -->
    <div th:each="sub : ${view.subFolders}"
         class="sh-tree-item"
         th:data-name="${sub.name}"
         th:style="'--folder-color:' + ${sub.colorHex}"
         style="margin-bottom: 0.25rem;">
        <div class="sh-tree-header sh-tree-toggle-btn">
            <span class="sh-tree-toggle">
                <i data-lucide="chevron-right"></i>
            </span>
            <span class="sh-tree-folder-icon">
                <i data-lucide="folder"></i>
            </span>
            <a th:href="@{/folders/{id}(id=${sub.id})}" class="sh-folder-name flex-1"
               hx-get th:hx-get="@{/folders/{id}(id=${sub.id})}"
               hx-target="#main-content" hx-push-url="true"
               onclick="event.stopPropagation();"
               th:text="${sub.name}">Subfolder</a>
        </div>
        <div class="sh-tree-children"
             th:hx-get="@{/folders/{id}/children(id=${sub.id})}"
             hx-trigger="intersect once"
             hx-swap="innerHTML">
        </div>
    </div>

    <!-- Decks -->
    <a th:each="deck : ${view.decks}" class="sh-tree-deck"
       th:href="@{/decks/{id}(id=${deck.id})}"
       hx-get th:hx-get="@{/decks/{id}(id=${deck.id})}"
       hx-target="#main-content" hx-push-url="true">
        <span class="sh-tree-deck-icon">
            <i data-lucide="layers"></i>
        </span>
        <span class="sh-folder-name flex-1" th:text="${deck.name}" style="font-size:0.8375rem;">Deck</span>
        <span class="sh-badge sh-badge-primary" th:text="${deck.flashcards.size()} + ' cards'"></span>
    </a>

    <!-- Empty hint if no children -->
    <div th:if="${#lists.isEmpty(view.subFolders) and #lists.isEmpty(view.decks)}"
         style="padding: 0.5rem 0.875rem; font-size: 0.8125rem; color: var(--text-muted);">
        No subfolders or decks
    </div>
</div>

</body>
</html>
