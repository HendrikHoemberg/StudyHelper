<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="picker">
    <div class="sh-wizard-panel" data-step="3" id="wizard-panel-3">
        <div class="vb-picker-head">
            <div class="sh-section-title" style="margin:0">Which sources?</div>
            <button type="button" id="vb-select-all-btn" class="vb-select-all">
                <iconify-icon icon="lucide:list-checks"></iconify-icon>
                <span class="vb-select-all-text">Select all</span>
            </button>
        </div>

        <div class="sh-study-search-wrap" style="margin-bottom:1rem;">
            <iconify-icon icon="lucide:search" class="sh-study-search-icon"></iconify-icon>
            <input type="text"
                   id="sh-source-search"
                   class="sh-study-search-input"
                   placeholder="Search decks &amp; files…"
                   aria-label="Search sources"
                   autocomplete="off">
        </div>

        <!-- Preserved initial preselection (outside #setup-picker so it survives mode-switch refreshes) -->
        <div id="sh-initial-selection" hidden>
            <input type="hidden" data-init-deck th:each="id : ${preselectedDeckIds}" th:value="${id}">
            <input type="hidden" data-init-file th:each="id : ${preselectedFileIds}" th:value="${id}">
        </div>

        <!-- HTMX-swapped region -->
        <div th:fragment="setupPicker" id="setup-picker">
            <!-- Warning banners for Quiz/Exam -->
            <div th:if="${#strings.toString(mode) == 'QUIZ' or #strings.toString(mode) == 'EXAM'}">
                <div th:if="${selectionExceedsCap}" class="sh-quiz-error-banner">
                    <iconify-icon icon="lucide:x-circle"></iconify-icon>
                    <span>Selection too large. Deselect some sources to continue.</span>
                </div>
                <div th:if="${selectionWarn and !selectionExceedsCap}" class="sh-quiz-warn-banner">
                    <iconify-icon icon="lucide:alert-triangle"></iconify-icon>
                    <span>Large selection — generation may be slow.</span>
                </div>
            </div>

            <div class="vb-list">
                <!-- Flashcards Mode: Decks Only -->
                <th:block th:if="${#strings.toString(mode) == 'FLASHCARDS'}">
                    <div th:if="${#lists.isEmpty(deckGroups)}" class="sh-empty" style="padding:1.25rem 1rem;">
                        <p class="sh-empty-text mb-1">No decks available</p>
                    </div>
                    <div th:each="group : ${deckGroups}" class="vb-group" th:style="'--folder-color: ' + ${group.folderColor}">
                        <label class="vb-group-head">
                            <input type="checkbox" class="sh-checkbox sh-source-folder-checkbox" th:checked="${group.isSelected}" th:attr="data-indeterminate=${group.isIndeterminate}" th:disabled="${group.selectableDeckCount == 0}"
                                   hx-post="/study/setup/update" th:hx-vals="${'{&quot;toggledFolderId&quot;: ' + group.folderId + ', &quot;mode&quot;: &quot;FLASHCARDS&quot;}'}" hx-target="#setup-picker" hx-include="[name='selectedDeckIds']" hx-swap="outerHTML">
                            <span class="vb-group-cap">
                                <iconify-icon th:attr="icon=${group.folderIcon.contains(':') ? group.folderIcon : 'lucide:' + group.folderIcon}"></iconify-icon>
                            </span>
                            <div class="vb-group-title" th:text="${group.folderName}">Folder</div>
                        </label>
                        <div class="vb-group-body">
                            <label th:each="deck : ${group.decks}" class="vb-deck" th:classappend="${deck.cardCount == 0 ? ' is-empty' : (#lists.contains(preselectedDeckIds, deck.deckId) ? ' is-selected' : '')}">
                                <input class="sh-checkbox sh-source-checkbox" type="checkbox" name="selectedDeckIds" th:value="${deck.deckId}" th:checked="${#lists.contains(preselectedDeckIds, deck.deckId)}" th:disabled="${deck.cardCount == 0}"
                                       hx-post="/study/setup/update" hx-target="#setup-picker" th:hx-vals="${'{&quot;mode&quot;: &quot;FLASHCARDS&quot;}'}" hx-include="[name='selectedDeckIds']" hx-swap="outerHTML">
                                <span class="vb-deck-icon" th:style="'color:' + ${deck.deckColorHex != null ? deck.deckColorHex : deck.folderColorHex}">
                                    <iconify-icon th:attr="icon=${(deck.deckIconName ?: 'layers').contains(':') ? (deck.deckIconName ?: 'layers') : 'lucide:' + (deck.deckIconName ?: 'layers')}"></iconify-icon>
                                </span>
                                <span class="vb-deck-name" th:text="${deck.deckName}">Deck</span>
                                <span class="sh-badge sh-badge-primary" th:text="${deck.cardCount} + ' cards'"></span>
                            </label>
                            <!-- Subfolders -->
                            <div th:each="sub : ${group.subGroups}" class="vb-subgroup" th:style="'--folder-color: ' + ${sub.folderColor}">
                                <label class="vb-subgroup-head">
                                    <input type="checkbox" class="sh-checkbox sh-source-folder-checkbox" th:checked="${sub.isSelected}" th:attr="data-indeterminate=${sub.isIndeterminate}" th:disabled="${sub.selectableDeckCount == 0}"
                                           hx-post="/study/setup/update" th:hx-vals="${'{&quot;toggledFolderId&quot;: ' + sub.folderId + ', &quot;mode&quot;: &quot;FLASHCARDS&quot;}'}" hx-target="#setup-picker" hx-include="[name='selectedDeckIds']" hx-swap="outerHTML">
                                    <span class="vb-subgroup-cap">
                                        <iconify-icon th:attr="icon=${sub.folderIcon.contains(':') ? sub.folderIcon : 'lucide:' + sub.folderIcon}"></iconify-icon>
                                    </span>
                                    <span class="vb-subgroup-name" th:text="${sub.folderName}">Subfolder</span>
                                </label>
                                <div class="vb-subgroup-body">
                                    <label th:each="deck : ${sub.decks}" class="vb-deck" th:classappend="${deck.cardCount == 0 ? ' is-empty' : (#lists.contains(preselectedDeckIds, deck.deckId) ? ' is-selected' : '')}">
                                        <input class="sh-checkbox sh-source-checkbox" type="checkbox" name="selectedDeckIds" th:value="${deck.deckId}" th:checked="${#lists.contains(preselectedDeckIds, deck.deckId)}" th:disabled="${deck.cardCount == 0}"
                                               hx-post="/study/setup/update" hx-target="#setup-picker" th:hx-vals="${'{&quot;mode&quot;: &quot;FLASHCARDS&quot;}'}" hx-include="[name='selectedDeckIds']" hx-swap="outerHTML">
                                        <span class="vb-deck-icon" th:style="'color:' + ${deck.deckColorHex != null ? deck.deckColorHex : deck.folderColorHex}">
                                    <iconify-icon th:attr="icon=${(deck.deckIconName ?: 'layers').contains(':') ? (deck.deckIconName ?: 'layers') : 'lucide:' + (deck.deckIconName ?: 'layers')}"></iconify-icon>
                                </span>
                                        <span class="vb-deck-name" th:text="${deck.deckName}">Deck</span>
                                        <span class="sh-badge sh-badge-primary" th:text="${deck.cardCount} + ' cards'"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </th:block>

                <!-- Quiz/Exam Mode: Decks + Files -->
                <th:block th:if="${#strings.toString(mode) == 'QUIZ' or #strings.toString(mode) == 'EXAM'}">
                    <div th:if="${#lists.isEmpty(quizSourceTree)}" class="sh-empty" style="padding:1.25rem 1rem;">
                        <p class="sh-empty-text mb-1">No sources available</p>
                    </div>
                    <div th:each="group : ${quizSourceTree}" class="vb-group" th:style="'--folder-color: ' + ${group.folderColor}">
                        <label class="vb-group-head">
                            <input type="checkbox" class="sh-checkbox sh-source-folder-checkbox" th:checked="${group.isSelected}" th:attr="data-indeterminate=${group.isIndeterminate}" th:disabled="${group.selectableSourceCount == 0}"
                                   hx-post="/study/setup/update" th:hx-vals="${'{&quot;toggledFolderId&quot;: ' + group.folderId + ', &quot;mode&quot;: &quot;' + mode + '&quot;}'}" hx-target="#setup-picker" hx-include="[name='selectedDeckIds'], [name='selectedFileIds'], [name^='pdfMode']" hx-swap="outerHTML">
                            <span class="vb-group-cap">
                                <iconify-icon th:attr="icon=${group.folderIcon.contains(':') ? group.folderIcon : 'lucide:' + group.folderIcon}"></iconify-icon>
                            </span>
                            <div class="vb-group-title" th:text="${group.folderName}">Folder</div>
                        </label>
                        <div class="vb-group-body">
                            <label th:each="deck : ${group.decks}" class="vb-deck" th:classappend="${deck.usableCardCount == 0 ? ' is-empty' : (#lists.contains(preselectedDeckIds, deck.deckId) ? ' is-selected' : '')}">
                                <input class="sh-checkbox sh-source-checkbox" type="checkbox" name="selectedDeckIds" th:value="${deck.deckId}" th:checked="${#lists.contains(preselectedDeckIds, deck.deckId)}" th:disabled="${deck.usableCardCount == 0}"
                                       hx-post="/study/setup/update" hx-target="#setup-picker" th:hx-vals="${'{&quot;mode&quot;: &quot;' + mode + '&quot;}'}" hx-include="[name='selectedDeckIds'], [name='selectedFileIds'], [name^='pdfMode']" hx-swap="outerHTML">
                                <span class="vb-deck-icon" th:style="'color:' + ${deck.deckColorHex != null ? deck.deckColorHex : deck.folderColorHex}">
                                    <iconify-icon th:attr="icon=${(deck.deckIconName ?: 'layers').contains(':') ? (deck.deckIconName ?: 'layers') : 'lucide:' + (deck.deckIconName ?: 'layers')}"></iconify-icon>
                                </span>
                                <span class="vb-deck-name" th:text="${deck.deckName}">Deck</span>
                                <span class="sh-badge sh-badge-primary" th:text="${deck.usableCardCount} + ' cards'"></span>
                            </label>
                            <div th:each="file : ${group.files}" class="vb-file" th:classappend="${!file.isSupported ? ' is-disabled' : (#lists.contains(preselectedFileIds, file.fileId) ? ' is-selected' : '')}">
                                <label class="vb-file-main">
                                    <input class="sh-checkbox sh-source-checkbox" type="checkbox" name="selectedFileIds" th:value="${file.fileId}" th:checked="${#lists.contains(preselectedFileIds, file.fileId)}" th:disabled="${!file.isSupported}"
                                           hx-post="/study/setup/update" hx-target="#setup-picker" th:hx-vals="${'{&quot;mode&quot;: &quot;' + mode + '&quot;}'}" hx-include="[name='selectedDeckIds'], [name='selectedFileIds'], [name^='pdfMode']" hx-swap="outerHTML">
                                    <span class="vb-file-icon"><iconify-icon icon="lucide:file-text"></iconify-icon></span>
                                    <span class="vb-file-name" th:text="${file.filename}">file.pdf</span>
                                    <span class="sh-badge" th:text="${file.extension.toUpperCase()}"></span>
                                </label>
                                <div th:if="${#strings.toLowerCase(file.extension) == 'pdf'}"
                                     class="vb-pdf-mode"
                                     th:classappend="${!#lists.contains(preselectedFileIds, file.fileId) || !file.isSupported ? ' is-disabled' : ''}"
                                     th:data-file-id="${file.fileId}"
                                     th:with="currentMode=${pdfMode != null && pdfMode.containsKey(file.fileId) ? pdfMode.get(file.fileId).name() : 'TEXT'}">
                                    <input type="hidden" th:name="'pdfMode[' + ${file.fileId} + ']'" th:value="${currentMode}">
                                    <button type="button" class="vb-pdf-mode-btn" th:classappend="${currentMode == 'TEXT' ? ' is-active' : ''}" data-mode="TEXT" th:disabled="${!#lists.contains(preselectedFileIds, file.fileId) || !file.isSupported}" th:attr="aria-pressed=${currentMode == 'TEXT'}">Text</button>
                                    <button type="button" class="vb-pdf-mode-btn" th:classappend="${currentMode == 'FULL_PDF' ? ' is-active' : ''}" data-mode="FULL_PDF" th:disabled="${!#lists.contains(preselectedFileIds, file.fileId) || !file.isSupported}" th:attr="aria-pressed=${currentMode == 'FULL_PDF'}" title="Send the full PDF with figures, diagrams, and layout. Uses more tokens (~258 per page).">Full PDF</button>
                                </div>
                            </div>
                            <!-- Subfolders -->
                            <div th:each="sub : ${group.subGroups}" class="vb-subgroup" th:style="'--folder-color: ' + ${sub.folderColor}">
                                <label class="vb-subgroup-head">
                                    <input type="checkbox" class="sh-checkbox sh-source-folder-checkbox" th:checked="${sub.isSelected}" th:attr="data-indeterminate=${sub.isIndeterminate}" th:disabled="${sub.selectableSourceCount == 0}"
                                           hx-post="/study/setup/update" th:hx-vals="${'{&quot;toggledFolderId&quot;: ' + sub.folderId + ', &quot;mode&quot;: &quot;' + mode + '&quot;}'}" hx-target="#setup-picker" hx-include="[name='selectedDeckIds'], [name='selectedFileIds'], [name^='pdfMode']" hx-swap="outerHTML">
                                    <span class="vb-subgroup-cap">
                                        <iconify-icon th:attr="icon=${sub.folderIcon.contains(':') ? sub.folderIcon : 'lucide:' + sub.folderIcon}"></iconify-icon>
                                    </span>
                                    <span class="vb-subgroup-name" th:text="${sub.folderName}">Subfolder</span>
                                </label>
                                <div class="vb-subgroup-body">
                                    <label th:each="deck : ${sub.decks}" class="vb-deck" th:classappend="${deck.usableCardCount == 0 ? ' is-empty' : (#lists.contains(preselectedDeckIds, deck.deckId) ? ' is-selected' : '')}">
                                        <input class="sh-checkbox sh-source-checkbox" type="checkbox" name="selectedDeckIds" th:value="${deck.deckId}" th:checked="${#lists.contains(preselectedDeckIds, deck.deckId)}" th:disabled="${deck.usableCardCount == 0}"
                                               hx-post="/study/setup/update" hx-target="#setup-picker" th:hx-vals="${'{&quot;mode&quot;: &quot;' + mode + '&quot;}'}" hx-include="[name='selectedDeckIds'], [name='selectedFileIds'], [name^='pdfMode']" hx-swap="outerHTML">
                                        <span class="vb-deck-icon" th:style="'color:' + ${deck.deckColorHex != null ? deck.deckColorHex : deck.folderColorHex}">
                                    <iconify-icon th:attr="icon=${(deck.deckIconName ?: 'layers').contains(':') ? (deck.deckIconName ?: 'layers') : 'lucide:' + (deck.deckIconName ?: 'layers')}"></iconify-icon>
                                </span>
                                        <span class="vb-deck-name" th:text="${deck.deckName}">Deck</span>
                                        <span class="sh-badge sh-badge-primary" th:text="${deck.usableCardCount} + ' cards'"></span>
                                    </label>
                                    <div th:each="file : ${sub.files}" class="vb-file" th:classappend="${!file.isSupported ? ' is-disabled' : (#lists.contains(preselectedFileIds, file.fileId) ? ' is-selected' : '')}">
                                        <label class="vb-file-main">
                                            <input class="sh-checkbox sh-source-checkbox" type="checkbox" name="selectedFileIds" th:value="${file.fileId}" th:checked="${#lists.contains(preselectedFileIds, file.fileId)}" th:disabled="${!file.isSupported}"
                                                   hx-post="/study/setup/update" hx-target="#setup-picker" th:hx-vals="${'{&quot;mode&quot;: &quot;' + mode + '&quot;}'}" hx-include="[name='selectedDeckIds'], [name='selectedFileIds'], [name^='pdfMode']" hx-swap="outerHTML">
                                            <span class="vb-file-icon"><iconify-icon icon="lucide:file-text"></iconify-icon></span>
                                            <span class="vb-file-name" th:text="${file.filename}">file.pdf</span>
                                            <span class="sh-badge" th:text="${file.extension.toUpperCase()}"></span>
                                        </label>
                                        <div th:if="${#strings.toLowerCase(file.extension) == 'pdf'}"
                                             class="vb-pdf-mode"
                                             th:classappend="${!#lists.contains(preselectedFileIds, file.fileId) || !file.isSupported ? ' is-disabled' : ''}"
                                             th:data-file-id="${file.fileId}"
                                             th:with="currentMode=${pdfMode != null && pdfMode.containsKey(file.fileId) ? pdfMode.get(file.fileId).name() : 'TEXT'}">
                                            <input type="hidden" th:name="'pdfMode[' + ${file.fileId} + ']'" th:value="${currentMode}">
                                            <button type="button" class="vb-pdf-mode-btn" th:classappend="${currentMode == 'TEXT' ? ' is-active' : ''}" data-mode="TEXT" th:disabled="${!#lists.contains(preselectedFileIds, file.fileId) || !file.isSupported}" th:attr="aria-pressed=${currentMode == 'TEXT'}">Text</button>
                                            <button type="button" class="vb-pdf-mode-btn" th:classappend="${currentMode == 'FULL_PDF' ? ' is-active' : ''}" data-mode="FULL_PDF" th:disabled="${!#lists.contains(preselectedFileIds, file.fileId) || !file.isSupported}" th:attr="aria-pressed=${currentMode == 'FULL_PDF'}" title="Send the full PDF with figures, diagrams, and layout. Uses more tokens (~258 per page).">Full PDF</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>

            <script>
                if (typeof reapplySearch === 'function') reapplySearch();
                if (typeof updateSelectAllButton === 'function') updateSelectAllButton();
            </script>
        </div>
    </div>
</div>

</body>
</html>
