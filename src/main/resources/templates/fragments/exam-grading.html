<div th:fragment="exam-grading-loader" id="grading-loader" class="sh-grading-modal" role="dialog"
    aria-modal="true">
    <div class="sh-modal-backdrop"></div>
    <div class="sh-modal-content" style="max-width: 500px; position: relative; z-index: 1;">
        <div class="sh-exam-loader">
            <div class="sh-exam-loader-spinner"></div>
            <div class="sh-exam-loader-text">Reading your answers...</div>
            <p class="mt-3 text-muted">AI is grading your exam. This should only take a few seconds.</p>
            <button type="button" class="sh-btn sh-btn-secondary sh-btn-sm" id="grading-abort-btn"
                style="margin-top: 1rem;">Cancel</button>
        </div>
    </div>
</div>
