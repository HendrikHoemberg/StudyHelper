<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="studySetup" id="study-session-content" class="sh-fade-in">

    <div th:if="${studyError}" class="sh-alert sh-alert-danger">
        <div class="sh-alert-body" th:text="${studyError}"></div>
        <button type="button" class="sh-alert-close" hx-on:click="this.closest('.sh-alert').remove()">
            <i data-lucide="x"></i>
        </button>
    </div>

    <div class="sh-page-header">
        <div>
            <h1 class="sh-page-title">Start Studying</h1>
            <p class="sh-page-subtitle">Select how you want to learn today.</p>
        </div>
        <div class="sh-page-actions">
            <a href="/dashboard" class="sh-btn sh-btn-secondary"
               hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
                <i data-lucide="arrow-left"></i>
                Back to Dashboard
            </a>
        </div>
    </div>

    <!-- Step indicator -->
    <div class="sh-wizard-steps" id="sh-wizard-steps">
        <!-- Filled by JS -->
    </div>

    <!-- Single form wrapping all panels -->
    <form class="sh-card sh-study-setup-card"
          method="post"
          hx-post="/study/session"
          hx-target="#study-session-content"
          hx-swap="outerHTML swap:500ms"
          hx-indicator="#ai-generating-modal"
          hx-disabled-elt="#wizard-btn-submit, #wizard-btn-next, #wizard-btn-back">

        <input type="hidden" name="mode" id="study-mode-input" th:value="${mode}">

        <div class="sh-card-body sh-wizard-body">

            <!-- Panel 1: Mode Picker -->
            <div class="sh-wizard-panel" data-step="1" id="wizard-panel-1">
                <div class="sh-section-title">What's the plan?</div>
                <div class="sh-study-mode-grid">
                    <label class="sh-study-choice" onclick="selectStudyMode(this, 'FLASHCARDS')">
                        <input type="radio" name="mode_picker" value="FLASHCARDS" th:checked="${mode == T(com.HendrikHoemberg.StudyHelper.dto.StudyMode).FLASHCARDS}">
                        <div class="sh-study-choice-icon">
                            <i data-lucide="book-open"></i>
                        </div>
                        <div class="sh-study-choice-title">Flashcards</div>
                        <div class="sh-study-choice-subtitle">
                            Flip through cards. Track right/wrong.
                        </div>
                    </label>
                    <label class="sh-study-choice" onclick="selectStudyMode(this, 'QUIZ')">
                        <input type="radio" name="mode_picker" value="QUIZ" th:checked="${mode == T(com.HendrikHoemberg.StudyHelper.dto.StudyMode).QUIZ}">
                        <div class="sh-study-choice-icon">
                            <i data-lucide="list-checks"></i>
                        </div>
                        <div class="sh-study-choice-title">AI Quiz</div>
                        <div class="sh-study-choice-subtitle">
                            Auto-generated multiple choice & true/false questions.
                        </div>
                    </label>
                    <label class="sh-study-choice" onclick="selectStudyMode(this, 'EXAM')">
                        <input type="radio" name="mode_picker" value="EXAM" th:checked="${mode == T(com.HendrikHoemberg.StudyHelper.dto.StudyMode).EXAM}">
                        <div class="sh-study-choice-icon">
                            <i data-lucide="pencil-line"></i>
                        </div>
                        <div class="sh-study-choice-title">Exam</div>
                        <div class="sh-study-choice-subtitle">
                            Long-form written answers, AI-graded.
                        </div>
                    </label>
                </div>
            </div>

            <!-- Panel 2s (Branched) -->
            <div th:replace="~{fragments/wizard-flashcards :: panels}"></div>
            <div th:replace="~{fragments/wizard-quiz :: panels}"></div>
            <div th:replace="~{fragments/wizard-exam :: panels}"></div>

            <!-- Panel 3: Sources (Shared) -->
            <div th:replace="~{fragments/wizard-source-picker :: picker}"></div>

            <!-- Sticky footer -->
            <div class="sh-wizard-footer">
                <button type="button" class="sh-btn sh-btn-secondary" id="wizard-btn-back">
                    <i data-lucide="arrow-left"></i> Back
                </button>
                <div style="display:flex;gap:0.75rem;margin-left:auto;">
                    <button type="button" class="sh-btn sh-btn-primary" id="wizard-btn-next">
                        Next <i data-lucide="arrow-right"></i>
                    </button>
                    <button type="submit" class="sh-btn sh-btn-primary" id="wizard-btn-submit" style="display:none;">
                        <i data-lucide="play"></i> Start
                    </button>
                </div>
            </div>
        </div>
    </form>

    <!-- AI Generation Modal (shown during quiz/exam AI generation) -->
    <div id="ai-generating-modal" class="sh-ai-gen-modal" role="dialog" aria-modal="true">
        <div class="sh-ai-gen-backdrop"></div>
        <div class="sh-ai-gen-dialog">
            <div class="sh-ai-gen-spinner"></div>
            <div>
                <div id="ai-gen-title" class="sh-ai-gen-title">Generating your quiz with AI…</div>
                <div class="sh-ai-gen-subtitle">This may take a few seconds.</div>
            </div>
            <button type="button" class="sh-btn sh-btn-secondary sh-btn-sm" id="ai-gen-abort-btn">Cancel</button>
        </div>
    </div>
</div>

</body>
</html>
