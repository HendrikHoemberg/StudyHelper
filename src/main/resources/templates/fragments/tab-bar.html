<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="tabBar" class="sh-tab-bar" role="tablist">
    <a th:classappend="${view.activeTab.name() == 'FOLDERS'} ? 'sh-tab-link is-active' : 'sh-tab-link'"
       th:href="@{/folders/{id}(id=${view.folder.id}, tab='folders')}"
       hx-get th:hx-get="@{/folders/{id}(id=${view.folder.id}, tab='folders')}"
       hx-target="#folder-tabs-section"
       hx-push-url="true"
       role="tab"
       th:aria-selected="${view.activeTab.name() == 'FOLDERS'}"
       aria-controls="tab-content"
       th:tabindex="${view.activeTab.name() == 'FOLDERS'} ? 0 : -1">
        Folders <span class="sh-tab-badge" th:text="${view.subFolders.size()}">0</span>
    </a>
    <a th:classappend="${view.activeTab.name() == 'DECKS'} ? 'sh-tab-link is-active' : 'sh-tab-link'"
       th:href="@{/folders/{id}(id=${view.folder.id}, tab='decks')}"
       hx-get th:hx-get="@{/folders/{id}(id=${view.folder.id}, tab='decks')}"
       hx-target="#folder-tabs-section"
       hx-push-url="true"
       role="tab"
       th:aria-selected="${view.activeTab.name() == 'DECKS'}"
       aria-controls="tab-content"
       th:tabindex="${view.activeTab.name() == 'DECKS'} ? 0 : -1">
        Decks <span class="sh-tab-badge" th:text="${view.decks.size()}">0</span>
    </a>
    <a th:classappend="${view.activeTab.name() == 'FILES'} ? 'sh-tab-link is-active' : 'sh-tab-link'"
       th:href="@{/folders/{id}(id=${view.folder.id}, tab='files')}"
       hx-get th:hx-get="@{/folders/{id}(id=${view.folder.id}, tab='files')}"
       hx-target="#folder-tabs-section"
       hx-push-url="true"
       role="tab"
       th:aria-selected="${view.activeTab.name() == 'FILES'}"
       aria-controls="tab-content"
       th:tabindex="${view.activeTab.name() == 'FILES'} ? 0 : -1">
        Files <span class="sh-tab-badge" th:text="${view.files.size()}">0</span>
    </a>
</div>

</body>
</html>
