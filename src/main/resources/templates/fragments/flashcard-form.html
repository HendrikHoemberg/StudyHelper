<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="flashcardModal" class="sh-modal is-open">
    <div class="sh-modal-backdrop" onclick="this.closest('.sh-modal').remove()"></div>
    <div class="sh-modal-dialog">
        <div class="sh-modal-content">
            <div class="sh-modal-header">
                <h5 class="sh-modal-title" th:text="${title}">Flashcard</h5>
                <button type="button" class="sh-modal-close" onclick="this.closest('.sh-modal').remove()">
                    <iconify-icon icon="lucide:x"></iconify-icon>
                </button>
            </div>
            <form th:action="${action}" method="post"
                  enctype="multipart/form-data"
                  hx-post th:hx-post="${action}"
                  hx-encoding="multipart/form-data"
                  hx-target="#flashcard-list"
                  hx-swap="innerHTML"
                  hx-on::after-request="if(event.detail.successful) this.closest('.sh-modal').remove()"
                  th:attr="data-flashcard-id=${flashcard?.id}">

                <input th:if="${deckId != null}" type="hidden" name="deckId" th:value="${deckId}">

                <div class="sh-modal-body">
                    <!-- Front side -->
                    <div>
                        <label class="sh-label">Front (Question)</label>
                        <textarea name="frontText" class="sh-input" rows="3"
                                  placeholder="Enter the question or prompt..."
                                  th:text="${flashcard?.frontText}"></textarea>
                        <div class="sh-img-zone" id="front-img-zone">
                            <div th:if="${frontImageUrl}" class="sh-img-preview-wrap" id="front-preview-wrap"
                                 th:attr="data-existing-url=${frontImageUrl}">
                                <img th:src="${frontImageUrl}" class="sh-img-preview sh-lightbox-trigger" alt="Front image">
                                <button type="button" class="sh-img-edit-btn" data-side="front" aria-label="Edit image">
                                    <iconify-icon icon="lucide:pencil"></iconify-icon>
                                </button>
                                <button type="button" class="sh-img-remove-btn" id="front-remove-btn">
                                    <iconify-icon icon="lucide:x"></iconify-icon>
                                </button>
                            </div>
                            <button type="button"
                                    th:class="${frontImageUrl != null} ? 'sh-img-drop-label is-hidden' : 'sh-img-drop-label'"
                                    id="front-drop-label"
                                    data-image-source-trigger="front">
                                <iconify-icon icon="lucide:image-plus"></iconify-icon>
                                <span>Add image</span>
                            </button>
                            <input type="file" id="frontImageInput" name="frontImage"
                                   accept="image/jpeg,image/png,image/webp,image/gif"
                                   class="sh-img-file-input">
                            <input type="hidden" name="removeFrontImage" id="removeFrontImage" value="false">
                        </div>
                    </div>

                    <!-- Back side -->
                    <div>
                        <label class="sh-label">Back (Answer)</label>
                        <textarea name="backText" class="sh-input" rows="3"
                                  placeholder="Enter the answer..."
                                  th:text="${flashcard?.backText}"></textarea>
                        <div class="sh-img-zone" id="back-img-zone">
                            <div th:if="${backImageUrl}" class="sh-img-preview-wrap" id="back-preview-wrap"
                                 th:attr="data-existing-url=${backImageUrl}">
                                <img th:src="${backImageUrl}" class="sh-img-preview sh-lightbox-trigger" alt="Back image">
                                <button type="button" class="sh-img-edit-btn" data-side="back" aria-label="Edit image">
                                    <iconify-icon icon="lucide:pencil"></iconify-icon>
                                </button>
                                <button type="button" class="sh-img-remove-btn" id="back-remove-btn">
                                    <iconify-icon icon="lucide:x"></iconify-icon>
                                </button>
                            </div>
                            <button type="button"
                                    th:class="${backImageUrl != null} ? 'sh-img-drop-label is-hidden' : 'sh-img-drop-label'"
                                    id="back-drop-label"
                                    data-image-source-trigger="back">
                                <iconify-icon icon="lucide:image-plus"></iconify-icon>
                                <span>Add image</span>
                            </button>
                            <input type="file" id="backImageInput" name="backImage"
                                   accept="image/jpeg,image/png,image/webp,image/gif"
                                   class="sh-img-file-input">
                            <input type="hidden" name="removeBackImage" id="removeBackImage" value="false">
                        </div>
                    </div>
                </div>
                <div class="sh-modal-footer">
                    <button type="button" class="sh-btn sh-btn-secondary" onclick="this.closest('.sh-modal').remove()">Cancel</button>
                    <button type="submit" class="sh-btn sh-btn-primary" th:text="${flashcard?.id == null ? 'New Card' : 'Save'}">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div class="sh-modal sh-image-source-modal" id="flashcard-image-source-modal" aria-modal="true" role="dialog" aria-labelledby="flashcard-image-source-title">
        <div class="sh-modal-backdrop" data-image-source-close></div>
        <div class="sh-modal-dialog sh-modal-dialog-sm">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title" id="flashcard-image-source-title">Add image</h5>
                    <button type="button" class="sh-modal-close" data-image-source-close aria-label="Close">
                        <iconify-icon icon="lucide:x"></iconify-icon>
                    </button>
                </div>
                <div class="sh-modal-body">
                    <button type="button" class="sh-btn sh-btn-secondary" data-image-source-browse>
                        <iconify-icon icon="lucide:folder-open"></iconify-icon>
                        <span>Browse files</span>
                    </button>
                    <button type="button" class="sh-btn sh-btn-primary" data-image-source-paste>
                        <iconify-icon icon="lucide:clipboard"></iconify-icon>
                        <span>Paste image</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            initLucide();
            var modal = document.querySelector('.sh-modal.is-open');
            if (modal) {
                var firstInput = modal.querySelector('textarea, input:not([type="hidden"]):not([type="file"])');
                if (firstInput) firstInput.focus();
            }

            // Removed local lightbox handling (now global)
            function bindLightbox(img) {
                img.classList.add('sh-lightbox-trigger');
            }

            document.querySelectorAll('.sh-img-preview').forEach(bindLightbox);

            document.addEventListener('keydown', function(e) {
                // Global Escape handler in app.js takes care of lightbox
            });

            var imageZones = {};
            var selectedImageSourceSide = null;

            function setupZone(zoneId, inputId, dropLabelId, removeInputId, removeBtnId, side) {
                var zone = document.getElementById(zoneId);
                var input = document.getElementById(inputId);
                var dropLabel = document.getElementById(dropLabelId);
                var removeInput = document.getElementById(removeInputId);
                var removeBtn = document.getElementById(removeBtnId);
                if (!zone || !input) return;

                input.addEventListener('change', function() {
                    if (this.files[0]) showPreview(this.files[0]);
                });

                zone.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    zone.classList.add('is-dragover');
                });
                zone.addEventListener('dragleave', function() {
                    zone.classList.remove('is-dragover');
                });
                zone.addEventListener('drop', function(e) {
                    e.preventDefault();
                    zone.classList.remove('is-dragover');
                    var file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        setImageFile(file);
                    }
                });

                if (removeBtn) {
                    removeBtn.addEventListener('click', clearPreview);
                }

                function setImageFile(file) {
                    var dt = new DataTransfer();
                    dt.items.add(file);
                    input.files = dt.files;
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                }

                function showPreview(file) {
                    var existing = zone.querySelector('.sh-img-preview-wrap');
                    if (existing) existing.remove();

                    var wrap = document.createElement('div');
                    wrap.className = 'sh-img-preview-wrap';

                    var img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.className = 'sh-img-preview';
                    img.alt = 'Preview';
                    bindLightbox(img);

                    var editBtn = document.createElement('button');
                    editBtn.type = 'button';
                    editBtn.className = 'sh-img-edit-btn';
                    editBtn.setAttribute('data-side', side);
                    editBtn.setAttribute('aria-label', 'Edit image');
                    editBtn.innerHTML = '<iconify-icon icon="lucide:pencil"></iconify-icon>';
                    editBtn.addEventListener('click', function() { openEditor(side); });

                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'sh-img-remove-btn';
                    btn.innerHTML = '<iconify-icon icon="lucide:x"></iconify-icon>';
                    btn.addEventListener('click', clearPreview);

                    wrap.appendChild(img);
                    wrap.appendChild(editBtn);
                    wrap.appendChild(btn);
                    zone.insertBefore(wrap, dropLabel);

                    dropLabel = document.getElementById(dropLabelId);
                    if (dropLabel) dropLabel.classList.add('is-hidden');
                    if (removeInput) removeInput.value = 'false';
                    initLucide();
                }

                function clearPreview() {
                    shConfirm({
                        title: 'Remove image?',
                        message: 'Remove this image from the flashcard?',
                        confirmText: 'Remove',
                        danger: true
                    }).then(function(ok) {
                        if (!ok) return;
                        var wrap = zone.querySelector('.sh-img-preview-wrap');
                        if (wrap) wrap.remove();
                        var lbl = document.getElementById(dropLabelId);
                        if (lbl) lbl.classList.remove('is-hidden');
                        input.value = '';
                        if (removeInput) removeInput.value = 'true';
                    });
                }

                return {
                    setImageFile: setImageFile,
                    browse: function() {
                        input.click();
                    },
                    hasPreview: function() {
                        return !!zone.querySelector('.sh-img-preview-wrap');
                    }
                };
            }

            imageZones.front = setupZone('front-img-zone', 'frontImageInput', 'front-drop-label', 'removeFrontImage', 'front-remove-btn', 'front');
            imageZones.back = setupZone('back-img-zone',  'backImageInput',  'back-drop-label',  'removeBackImage',  'back-remove-btn',  'back');

            function handleImagePaste(e) {
                var activeModal = document.querySelector('.sh-modal.is-open');
                if (!activeModal || !activeModal.contains(e.target)) return;

                var clipboardData = e.clipboardData || window.clipboardData;
                if (!clipboardData || !clipboardData.items) return;

                if (setImageFromClipboardItems(clipboardData.items, selectPasteTargetSide())) {
                    e.preventDefault();
                }
            }

            function selectPasteTargetSide() {
                var activeElement = document.activeElement;
                if (activeElement && activeElement.name === 'backText') return 'back';
                if (activeElement && activeElement.name === 'frontText') return 'front';
                if (imageZones.front && !imageZones.front.hasPreview()) return 'front';
                if (imageZones.back && !imageZones.back.hasPreview()) return 'back';
                return 'front';
            }

            function setImageFromClipboardItems(items, side) {
                if (!items || !imageZones[side]) return false;
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    if (!item.type || !item.type.startsWith('image/')) continue;

                    var blob = item.getAsFile();
                    if (!blob) return false;

                    imageZones[side].setImageFile(fileFromImageBlob(blob));
                    return true;
                }
                return false;
            }

            function fileFromImageBlob(blob) {
                var extension = (blob.type.split('/')[1] || 'png').replace('jpeg', 'jpg');
                var filename = 'pasted-image-' + Date.now() + '.' + extension;
                var file = new File([blob], filename, { type: blob.type || 'image/png' });
                return file;
            }

            if (window.flashcardImagePasteHandler) {
                document.removeEventListener('paste', window.flashcardImagePasteHandler);
            }
            window.flashcardImagePasteHandler = handleImagePaste;
            document.addEventListener('paste', handleImagePaste);

            function openImageSourceModal(side) {
                selectedImageSourceSide = side;
                var sourceModal = document.getElementById('flashcard-image-source-modal');
                if (!sourceModal) return;
                sourceModal.classList.add('is-open');
                initLucide();
                var pasteButton = sourceModal.querySelector('[data-image-source-paste]');
                if (pasteButton) pasteButton.focus();
            }

            function closeImageSourceModal() {
                var sourceModal = document.getElementById('flashcard-image-source-modal');
                if (sourceModal) sourceModal.classList.remove('is-open');
            }

            function pasteImageFromClipboard(side) {
                if (!side || !imageZones[side]) return;
                if (!navigator.clipboard || !navigator.clipboard.read) {
                    closeImageSourceModal();
                    shAlert({
                        title: 'Paste image',
                        message: 'Press Ctrl+V or Cmd+V while this flashcard is open to paste an image.',
                        icon: 'lucide:clipboard'
                    });
                    return;
                }

                navigator.clipboard.read()
                    .then(function(items) {
                        var imagePromise = null;
                        items.forEach(function(item) {
                            if (imagePromise) return;
                            var imageType = item.types.find(function(type) {
                                return type.startsWith('image/');
                            });
                            if (imageType) imagePromise = item.getType(imageType);
                        });
                        return imagePromise || null;
                    })
                    .then(function(blob) {
                        closeImageSourceModal();
                        if (!blob) {
                            shAlert({
                                title: 'No image found',
                                message: 'Copy an image first, then choose Paste image again.',
                                icon: 'lucide:clipboard'
                            });
                            return;
                        }
                        imageZones[side].setImageFile(fileFromImageBlob(blob));
                    })
                    .catch(function() {
                        closeImageSourceModal();
                        shAlert({
                            title: 'Paste image',
                            message: 'Your browser blocked direct clipboard access. Press Ctrl+V or Cmd+V while this flashcard is open instead.',
                            icon: 'lucide:clipboard'
                        });
                    });
            }

            document.querySelectorAll('[data-image-source-trigger]').forEach(function(trigger) {
                trigger.addEventListener('click', function() {
                    openImageSourceModal(trigger.dataset.imageSourceTrigger);
                });
            });

            document.querySelectorAll('[data-image-source-close]').forEach(function(closeTrigger) {
                closeTrigger.addEventListener('click', closeImageSourceModal);
            });

            var browseTrigger = document.querySelector('[data-image-source-browse]');
            if (browseTrigger) {
                browseTrigger.addEventListener('click', function() {
                    if (selectedImageSourceSide && imageZones[selectedImageSourceSide]) {
                        imageZones[selectedImageSourceSide].browse();
                    }
                    closeImageSourceModal();
                });
            }

            var pasteTrigger = document.querySelector('[data-image-source-paste]');
            if (pasteTrigger) {
                pasteTrigger.addEventListener('click', function() {
                    pasteImageFromClipboard(selectedImageSourceSide);
                });
            }

            function csrfHeaders() {
                var tokenEl  = document.querySelector('meta[name="_csrf"]');
                var headerEl = document.querySelector('meta[name="_csrf_header"]');
                var h = {};
                if (tokenEl && headerEl) h[headerEl.content] = tokenEl.content;
                return h;
            }

            var flashcardForm = document.querySelector('.sh-modal form[data-flashcard-id]');
            var flashcardId   = flashcardForm ? flashcardForm.dataset.flashcardId : null;

            function openEditor(side) {
                var input = document.getElementById(side + 'ImageInput');
                var wrap  = document.getElementById(side + '-preview-wrap');
                var existingUrl = wrap ? wrap.dataset.existingUrl : null;

                if (input && input.files && input.files[0]) {
                    var origFile = input.files[0];
                    ImageEditor.open({
                        source:   origFile,
                        filename: origFile.name,
                        mode:     'flashcard-new',
                        onSave: function(blob) {
                            var newName = origFile.name.replace(/\.[^.]+$/, '') + '.png';
                            var file = new File([blob], newName, { type: 'image/png' });
                            var dt = new DataTransfer();
                            dt.items.add(file);
                            input.files = dt.files;
                            input.dispatchEvent(new Event('change', { bubbles: true }));
                        },
                    });
                } else if (existingUrl) {
                    ImageEditor.open({
                        source:   existingUrl,
                        filename: side + '.png',
                        mode:     'flashcard-existing',
                        onSave: function(blob) {
                            var fd = new FormData();
                            fd.append('image', blob, side + '.png');
                            return fetch('/flashcards/' + flashcardId + '/images/' + side,
                                         { method: 'POST', body: fd, headers: csrfHeaders() })
                                .then(function(resp) {
                                    if (!resp.ok) throw new Error('Save failed');
                                    var imgEl = document.getElementById(side + '-preview-wrap');
                                    imgEl = imgEl ? imgEl.querySelector('img') : null;
                                    if (imgEl) imgEl.src = existingUrl + '?v=' + Date.now();
                                });
                        },
                    });
                }
            }

            document.querySelectorAll('.sh-img-edit-btn[data-side]').forEach(function(btn) {
                btn.addEventListener('click', function() { openEditor(btn.dataset.side); });
            });
        })();
    </script>
</div>

</body>
</html>
