<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Image editor modal — included once in layout, opened/closed by ImageEditor.open/close -->
<div th:fragment="modal"
     id="sh-ie-modal"
     class="sh-ie-modal"
     style="display:none;"
     role="dialog"
     aria-modal="true"
     aria-labelledby="sh-ie-title">

    <!-- Header -->
    <div class="sh-ie-header">
        <span class="sh-ie-title" id="sh-ie-title">Image Editor</span>
        <button type="button" class="sh-ie-hdr-btn" id="sh-ie-close-btn" aria-label="Close editor">
            <i data-lucide="x"></i>
        </button>
    </div>

    <!-- Body: toolbar + canvas -->
    <div class="sh-ie-body">

        <!-- Left toolbar -->
        <nav class="sh-ie-toolbar" aria-label="Drawing tools">
            <button type="button" class="sh-ie-tool-btn is-active"
                    data-tool="brush" title="Brush (B)" aria-label="Brush">
                <i data-lucide="pencil"></i>
            </button>
            <button type="button" class="sh-ie-tool-btn"
                    data-tool="eraser" title="Eraser (E)" aria-label="Eraser">
                <i data-lucide="eraser"></i>
            </button>

            <div class="sh-ie-sep" role="separator"></div>

            <button type="button" class="sh-ie-tool-btn"
                    data-tool="rect" title="Rectangle (R)" aria-label="Rectangle">
                <i data-lucide="square"></i>
            </button>
            <button type="button" class="sh-ie-tool-btn"
                    data-tool="ellipse" title="Ellipse (O)" aria-label="Ellipse">
                <i data-lucide="circle"></i>
            </button>
            <button type="button" class="sh-ie-tool-btn"
                    data-tool="line" title="Line (L)" aria-label="Line">
                <i data-lucide="minus"></i>
            </button>
            <button type="button" class="sh-ie-tool-btn"
                    data-tool="text" title="Text (T)" aria-label="Text">
                <i data-lucide="type"></i>
            </button>

            <div class="sh-ie-sep" role="separator"></div>

            <button type="button" class="sh-ie-color-btn" id="sh-ie-color-btn"
                    title="Pick color" aria-label="Stroke color">
                <span class="sh-ie-color-swatch" id="sh-ie-color-swatch"
                      style="background:#000000"></span>
            </button>

            <div class="sh-ie-sep" role="separator"></div>

            <button type="button" class="sh-ie-tool-btn" id="sh-ie-undo-btn"
                    title="Undo (Ctrl+Z)" aria-label="Undo" disabled>
                <i data-lucide="undo-2"></i>
            </button>
            <button type="button" class="sh-ie-tool-btn" id="sh-ie-redo-btn"
                    title="Redo (Ctrl+Shift+Z)" aria-label="Redo" disabled>
                <i data-lucide="redo-2"></i>
            </button>

            <div class="sh-ie-sep" role="separator"></div>

            <button type="button" class="sh-ie-tool-btn sh-ie-tool-danger"
                    id="sh-ie-clear-btn" title="Clear all drawings" aria-label="Clear">
                <i data-lucide="trash-2"></i>
            </button>
        </nav>

        <!-- Canvas area -->
        <div class="sh-ie-canvas-area">
            <div class="sh-ie-canvas-wrap" id="sh-ie-canvas-wrap"></div>
            <div class="sh-ie-overlay" id="sh-ie-loading" style="display:none;" aria-label="Loading">
                <i data-lucide="loader-2" class="sh-ie-spin"></i>
            </div>
            <div class="sh-ie-overlay sh-ie-error-panel" id="sh-ie-error" style="display:none;">
                <p class="sh-ie-error-msg" id="sh-ie-error-msg">Failed to load image.</p>
                <div class="sh-ie-error-actions">
                    <button type="button" class="sh-btn sh-btn-primary" id="sh-ie-retry-btn">Retry</button>
                    <button type="button" class="sh-btn sh-btn-secondary" id="sh-ie-err-cancel-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="sh-ie-footer">
        <div class="sh-ie-controls">
            <!-- Brush/shape controls -->
            <div class="sh-ie-ctrl-group" id="sh-ie-brush-controls">
                <label class="sh-ie-ctrl-label" for="sh-ie-size-slider">Size</label>
                <input type="range" class="sh-ie-slider" id="sh-ie-size-slider"
                       min="1" max="60" value="8" aria-label="Brush/shape size">
                <span class="sh-ie-ctrl-val" id="sh-ie-size-val">8</span>

                <label class="sh-ie-ctrl-label" for="sh-ie-opacity-slider">Opacity</label>
                <input type="range" class="sh-ie-slider" id="sh-ie-opacity-slider"
                       min="1" max="100" value="100" aria-label="Brush opacity">
                <span class="sh-ie-ctrl-val" id="sh-ie-opacity-val">100%</span>
            </div>
            <!-- Text tool controls -->
            <div class="sh-ie-ctrl-group" id="sh-ie-text-controls" style="display:none;">
                <label class="sh-ie-ctrl-label" for="sh-ie-font-slider">Font</label>
                <input type="range" class="sh-ie-slider" id="sh-ie-font-slider"
                       min="8" max="120" value="24" aria-label="Font size">
                <span class="sh-ie-ctrl-val" id="sh-ie-font-val">24</span>
            </div>
            <!-- Zoom indicator -->
            <div class="sh-ie-ctrl-group" id="sh-ie-zoom-controls">
                <span class="sh-ie-ctrl-label">Zoom</span>
                <span class="sh-ie-ctrl-val" id="sh-ie-zoom-val">100%</span>
                <button type="button" class="sh-ie-zoom-reset" id="sh-ie-zoom-reset"
                        title="Reset zoom (0)" aria-label="Reset zoom">Reset</button>
            </div>
        </div>

        <div class="sh-ie-footer-alert sh-alert sh-alert-danger"
             id="sh-ie-footer-alert" style="display:none;" role="alert"></div>

        <div class="sh-ie-actions">
            <button type="button" class="sh-btn sh-btn-secondary" id="sh-ie-cancel-btn">
                Cancel
            </button>
            <button type="button" class="sh-btn sh-btn-secondary"
                    id="sh-ie-saveas-btn" style="display:none;">
                Save as new
            </button>
            <button type="button" class="sh-btn sh-btn-primary" id="sh-ie-save-btn">
                <i data-lucide="save"></i>
                <span id="sh-ie-save-label">Save</span>
            </button>
        </div>
    </div>

    <!-- Filename Prompt Modal Overlay -->
    <div class="sh-ie-overlay" id="sh-ie-prompt" style="display:none; z-index: 2000;" role="dialog" aria-modal="true" aria-labelledby="sh-ie-prompt-title">
        <div class="sh-ie-prompt-panel">
            <h3 class="sh-ie-prompt-title" id="sh-ie-prompt-title">Save as new</h3>
            <p class="sh-ie-prompt-desc">Enter a name for the new file:</p>
            <input type="text" id="sh-ie-prompt-input" class="sh-ie-prompt-input" autocomplete="off" />
            <div class="sh-ie-prompt-actions">
                <button type="button" class="sh-btn sh-btn-secondary" id="sh-ie-prompt-cancel">Cancel</button>
                <button type="button" class="sh-btn sh-btn-primary" id="sh-ie-prompt-ok">Save</button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
