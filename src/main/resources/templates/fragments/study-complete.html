<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="studyComplete" id="study-session-content" class="sh-fade-in sh-study-session-active">

    <div th:if="${studyError}" class="sh-alert sh-alert-danger">
        <div class="sh-alert-body" th:text="${studyError}"></div>
        <button type="button" class="sh-alert-close" hx-on:click="this.closest('.sh-alert').remove()">
            <iconify-icon icon="lucide:x"></iconify-icon>
        </button>
    </div>

    <div class="sh-card sh-study-complete-card">
        <div class="sh-card-body">
            <h1 class="sh-page-title text-center mb-2">Session Complete</h1>
            <div class="sh-study-score-hero"
                 th:classappend="${stats.percentage >= 80 ? 'sh-study-score--good' : (stats.percentage >= 60 ? 'sh-study-score--warn' : 'sh-study-score--bad')}">
                <div class="sh-study-stat-label">Your Score</div>
                <div class="sh-study-stat-value" th:text="${stats.percentage} + '%'">0%</div>
            </div>

            <div class="sh-study-stats-grid">
                <div class="sh-study-stat sh-study-stat--correct">
                    <div class="sh-study-stat-icon"><iconify-icon icon="lucide:check"></iconify-icon></div>
                    <div class="sh-study-stat-label">Correct</div>
                    <div class="sh-study-stat-value" th:text="${stats.correctAnswers}">0</div>
                </div>
                <div class="sh-study-stat sh-study-stat--incorrect">
                    <div class="sh-study-stat-icon"><iconify-icon icon="lucide:x"></iconify-icon></div>
                    <div class="sh-study-stat-label">Incorrect</div>
                    <div class="sh-study-stat-value" th:text="${stats.incorrectAnswers}">0</div>
                </div>
            </div>


            <div class="sh-study-complete-actions">
                <form th:if="${incorrectCardCount > 0}"
                      method="post"
                      hx-post="/session/redo-incorrect"
                      hx-target="#study-session-content"
                      hx-swap="outerHTML">
                    <button type="submit" class="sh-btn sh-btn-secondary">
                        <iconify-icon icon="lucide:x-circle"></iconify-icon>
                        Redo Incorrect (<span th:text="${incorrectCardCount}">0</span>)
                    </button>
                </form>
                <form method="post"
                      hx-post="/session/redo"
                      hx-target="#study-session-content"
                      hx-swap="outerHTML">
                    <button type="submit" class="sh-btn sh-btn-primary">
                        <iconify-icon icon="lucide:refresh-cw"></iconify-icon>
                        Redo Session
                    </button>
                </form>
                <a href="/study/start" class="sh-btn sh-btn-secondary"
                   hx-get="/study/start" hx-target="#explorer-detail" hx-push-url="true">
                    <iconify-icon icon="lucide:settings"></iconify-icon>
                    Reconfigure
                </a>
                <a href="/dashboard" class="sh-btn sh-btn-secondary"
                   hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
                    <iconify-icon icon="lucide:layout-dashboard"></iconify-icon>
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
