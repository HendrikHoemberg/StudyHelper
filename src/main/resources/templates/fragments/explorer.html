<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Explorer content fragment — swapped into #main-content -->
<div th:fragment="explorerContent" class="sh-fade-in">

    <!-- Alert for errors -->
    <div th:if="${error}" class="sh-alert sh-alert-danger">
        <div class="sh-alert-body" th:text="${error}"></div>
        <button type="button" class="sh-alert-close" data-dismiss-alert>
            <i data-lucide="x"></i>
        </button>
    </div>

    <!-- Page header -->
    <div class="sh-page-header">
        <div>
            <h1 class="sh-page-title">My Folders</h1>
        </div>
        <div class="sh-page-actions">
            <a href="/study/start" class="sh-btn sh-btn-secondary"
               hx-get="/study/start" hx-target="#main-content" hx-push-url="true">
                <i data-lucide="book-open"></i>
                Start Study
            </a>
            <button class="sh-btn sh-btn-primary" data-modal-open="newFolderModal">
                <i data-lucide="plus"></i>
                New Folder
            </button>
        </div>
    </div>

    <!-- Search toolbar -->
    <div class="sh-toolbar">
        <div class="sh-search-bar" style="min-width: 240px;">
            <span class="sh-search-icon">
                <i data-lucide="search"></i>
            </span>
            <input type="text" class="sh-input sh-search-input" placeholder="Search folders..."
                   data-filter-target=".sh-tree-item-root">
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(folders)}" class="sh-empty">
        <div class="sh-empty-icon">
            <i data-lucide="folder-open"></i>
        </div>
        <p class="sh-empty-text">No folders yet</p>
        <p class="sh-empty-hint">Create a folder to start organising your study materials.</p>
    </div>

    <!-- Explorer tree -->
    <ul th:if="${!#lists.isEmpty(folders)}" class="sh-tree">
        <li th:each="folder, iterStat : ${folders}"
            class="sh-tree-item sh-tree-item-root"
            th:data-name="${folder.name}"
            th:style="'--folder-color:' + ${folder.colorHex}">
            <div class="sh-tree-header sh-tree-toggle-btn">
                <span class="sh-tree-toggle">
                    <i data-lucide="chevron-right"></i>
                </span>
                <span class="sh-tree-folder-icon">
                    <i data-lucide="folder"></i>
                </span>
                <a th:href="@{/folders/{id}(id=${folder.id})}" class="sh-folder-name flex-1"
                   hx-get th:hx-get="@{/folders/{id}(id=${folder.id})}"
                   hx-target="#main-content" hx-push-url="true"
                   onclick="event.stopPropagation();"
                   th:text="${folder.name}">Folder</a>
                <span class="sh-badge sh-badge-muted"
                      th:text="${cardCounts[iterStat.index][0]} + ' cards'"></span>
            </div>
            <!-- Children loaded via HTMX on expand -->
            <div class="sh-tree-children"
                 th:hx-get="@{/folders/{id}/children(id=${folder.id})}"
                 hx-trigger="intersect once"
                 hx-swap="innerHTML">
            </div>
        </li>
    </ul>

    <!-- New Folder Modal -->
    <div class="sh-modal" id="newFolderModal">
        <div class="sh-modal-backdrop"></div>
        <div class="sh-modal-dialog sh-modal-dialog-sm">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title">New Folder</h5>
                    <button type="button" class="sh-modal-close" data-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form th:action="@{/folders}" method="post">
                    <div class="sh-modal-body">
                        <div>
                            <label class="sh-label">Name</label>
                            <input type="text" name="name" class="sh-input" required autofocus
                                   placeholder="e.g. Mathematics">
                        </div>
                        <div>
                            <label class="sh-label">Color</label>
                            <input type="color" name="colorHex" class="sh-color-input" value="#6366f1">
                        </div>
                    </div>
                    <div class="sh-modal-footer">
                        <button type="button" class="sh-btn sh-btn-secondary" data-modal-close>Cancel</button>
                        <button type="submit" class="sh-btn sh-btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

</body>
</html>
