<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Fragment: folder detail view (swapped into #main-content) -->
<div th:fragment="folderDetail" class="sh-fade-in">

    <!-- Alert for errors -->
    <div th:if="${error}" class="sh-alert sh-alert-danger">
        <div class="sh-alert-body" th:text="${error}"></div>
        <button type="button" class="sh-alert-close" data-dismiss-alert>
            <i data-lucide="x"></i>
        </button>
    </div>

    <!-- Breadcrumb -->
    <ul class="sh-breadcrumb">
        <li>
            <a href="/folders" hx-get="/folders" hx-target="#explorer-detail"
               hx-select=".sh-explorer-detail-content" hx-push-url="true">My Folders</a>
        </li>
        <th:block th:each="crumb, stat : ${view.breadcrumb}">
            <li class="sh-breadcrumb-sep"><i data-lucide="chevron-right"></i></li>
            <li th:if="!${stat.last}">
                     <a th:href="@{/folders/{id}(id=${crumb.id})}"
                         hx-get th:hx-get="@{/folders/{id}(id=${crumb.id})}"
                         hx-target="#explorer-detail" hx-push-url="true"
                         th:text="${crumb.name}">Crumb</a>
            </li>
            <li th:if="${stat.last}" class="sh-breadcrumb-current" th:text="${crumb.name}">Current</li>
        </th:block>
    </ul>

    <!-- Folder header -->
    <div class="sh-page-header">
        <div class="flex items-center gap-3">
            <div class="sh-folder-card-icon" th:style="'color:' + ${view.folder.colorHex}">
                <i data-lucide="folder" style="width:28px;height:28px;"></i>
            </div>
            <div>
                <h1 class="sh-page-title" th:text="${view.folder.name}">Folder Name</h1>
                <span class="sh-badge sh-badge-muted mt-1"
                      th:text="${view.totalCardCount} + ' cards total'"></span>
            </div>
        </div>
        <div class="sh-page-actions">
            <button class="sh-btn sh-btn-secondary sh-btn-sm" data-modal-open="newSubfolderModal">
                <i data-lucide="folder-plus"></i>
                Subfolder
            </button>
            <button class="sh-btn sh-btn-secondary sh-btn-sm" data-modal-open="newDeckModal">
                <i data-lucide="layers"></i>
                Deck
            </button>
            <button class="sh-btn sh-btn-secondary sh-btn-sm" data-modal-open="uploadModal">
                <i data-lucide="upload"></i>
                Upload
            </button>
            <form th:action="@{/folders/{id}/delete(id=${view.folder.id})}" method="post" style="display:inline;">
                <button type="submit" class="sh-btn sh-btn-danger sh-btn-sm"
                        data-confirm="Delete this folder and all its contents? This action cannot be undone.">
                    <i data-lucide="trash-2"></i>
                    Delete
                </button>
            </form>
        </div>
    </div>

    <!-- Subfolders section -->
    <div th:if="${!#lists.isEmpty(view.subFolders)}" class="mb-5">
        <div class="sh-section-title">Subfolders</div>
        <div class="sh-card-grid">
            <a th:each="sub : ${view.subFolders}"
               th:href="@{/folders/{id}(id=${sub.id})}"
               class="sh-folder-card"
               th:style="'--folder-color:' + ${sub.colorHex}"
               hx-get th:hx-get="@{/folders/{id}(id=${sub.id})}"
               hx-target="#explorer-detail" hx-push-url="true">
                <div class="sh-folder-card-inner">
                    <span class="sh-folder-card-icon">
                        <i data-lucide="folder"></i>
                    </span>
                    <span class="sh-folder-name" th:text="${sub.name}">Subfolder</span>
                </div>
            </a>
        </div>
    </div>

    <!-- Decks section -->
    <div th:if="${!#lists.isEmpty(view.decks)}" class="mb-5">
        <div class="sh-section-title">Decks</div>
        <div class="sh-card-grid">
            <a th:each="deck : ${view.decks}"
               th:href="@{/decks/{id}(id=${deck.id})}"
               class="sh-deck-card"
               hx-get th:hx-get="@{/decks/{id}(id=${deck.id})}"
               hx-target="#explorer-detail" hx-push-url="true">
                <div class="sh-deck-info">
                    <div class="sh-deck-icon">
                        <i data-lucide="layers"></i>
                    </div>
                    <div>
                        <div class="sh-deck-name" th:text="${deck.name}">Deck Name</div>
                        <div class="sh-folder-meta" th:text="${deck.flashcards.size()} + ' cards'">0 cards</div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Files section -->
    <div class="sh-card">
        <div class="sh-card-header">
            <h6 class="sh-card-header-title">Files</h6>
            <button class="sh-btn sh-btn-primary sh-btn-sm" data-modal-open="uploadModal">
                <i data-lucide="upload"></i>
                Upload File
            </button>
        </div>

        <!-- Empty files state -->
        <div th:if="${#lists.isEmpty(view.files)}" class="sh-card-body">
            <div class="sh-empty" style="padding: 1.5rem;">
                <p class="sh-empty-text" style="margin:0;">No files in this folder yet.</p>
            </div>
        </div>

        <!-- Files table -->
        <div th:if="${!#lists.isEmpty(view.files)}">
            <table class="sh-file-table">
                <thead>
                    <tr>
                        <th data-sort="name">Name <span class="sort-indicator">▲</span></th>
                        <th data-sort="type">Type <span class="sort-indicator">▲</span></th>
                        <th data-sort="size">Size <span class="sort-indicator">▲</span></th>
                        <th data-sort="date">Uploaded <span class="sort-indicator">▲</span></th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="file : ${view.files}">
                        <td class="sh-file-name" th:text="${file.originalFilename}">filename.pdf</td>
                        <td class="sh-file-meta" th:text="${file.mimeType}">application/pdf</td>
                        <td class="sh-file-meta" th:data-size-bytes="${file.fileSizeBytes}"
                            th:text="${#numbers.formatDecimal(file.fileSizeBytes / 1024.0, 1, 1) + ' KB'}">0 KB</td>
                        <td class="sh-file-meta" th:data-timestamp="${file.uploadedAt}"
                            th:text="${#temporals.format(file.uploadedAt, 'dd MMM yyyy HH:mm')}">01 Jan 2025</td>
                        <td style="text-align:right; white-space:nowrap;">
                            <a th:href="@{/files/{id}/view(id=${file.id})}" target="_blank"
                               class="sh-btn sh-btn-ghost sh-btn-sm">View</a>
                            <a th:href="@{/files/{id}/download(id=${file.id})}"
                               class="sh-btn sh-btn-ghost sh-btn-sm">Download</a>
                            <form th:action="@{/files/{id}/delete(id=${file.id})}" method="post"
                                  style="display:inline;">
                                <button type="submit" class="sh-btn sh-btn-ghost sh-btn-sm"
                                        style="color:var(--danger);"
                                        data-confirm="Delete this file?">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="sh-modal" id="uploadModal">
        <div class="sh-modal-backdrop"></div>
        <div class="sh-modal-dialog">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title">Upload File</h5>
                    <button type="button" class="sh-modal-close" data-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form th:action="@{/folders/{id}/files(id=${view.folder.id})}" method="post"
                      enctype="multipart/form-data">
                    <div class="sh-modal-body">
                        <div>
                            <label class="sh-label">File</label>
                            <input type="file" name="file" class="sh-input" required>
                        </div>
                        <p style="color:var(--text-muted); font-size:0.8125rem; margin:0;">
                            Maximum file size: 100 MB</p>
                    </div>
                    <div class="sh-modal-footer">
                        <button type="button" class="sh-btn sh-btn-secondary" data-modal-close>Cancel</button>
                        <button type="submit" class="sh-btn sh-btn-primary">Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- New Subfolder Modal -->
    <div class="sh-modal" id="newSubfolderModal">
        <div class="sh-modal-backdrop"></div>
        <div class="sh-modal-dialog sh-modal-dialog-sm">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title">New Subfolder</h5>
                    <button type="button" class="sh-modal-close" data-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form th:action="@{/folders/{id}/subfolders(id=${view.folder.id})}" method="post">
                    <div class="sh-modal-body">
                        <div>
                            <label class="sh-label">Name</label>
                            <input type="text" name="name" class="sh-input" required autofocus
                                   placeholder="e.g. Chapter 1">
                        </div>
                        <div>
                            <label class="sh-label">Color</label>
                            <input type="color" name="colorHex" class="sh-color-input" value="#6366f1">
                        </div>
                    </div>
                    <div class="sh-modal-footer">
                        <button type="button" class="sh-btn sh-btn-secondary" data-modal-close>Cancel</button>
                        <button type="submit" class="sh-btn sh-btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- New Deck Modal -->
    <div class="sh-modal" id="newDeckModal">
        <div class="sh-modal-backdrop"></div>
        <div class="sh-modal-dialog sh-modal-dialog-sm">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title">New Deck</h5>
                    <button type="button" class="sh-modal-close" data-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form th:action="@{/folders/{fid}/decks(fid=${view.folder.id})}" method="post">
                    <div class="sh-modal-body">
                        <div>
                            <label class="sh-label">Deck Name</label>
                            <input type="text" name="name" class="sh-input" required autofocus
                                   placeholder="e.g. Vocabulary">
                        </div>
                    </div>
                    <div class="sh-modal-footer">
                        <button type="button" class="sh-btn sh-btn-secondary" data-modal-close>Cancel</button>
                        <button type="submit" class="sh-btn sh-btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

</body>
</html>
