<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- Layout fragment: shared head -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' — StudyHelper'">StudyHelper</title>
    <meta name="description" content="StudyHelper — A flashcard study application">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>

<!-- Layout fragment: navbar -->
<nav th:fragment="navbar" class="navbar sh-navbar">
    <div class="container">
        <a class="navbar-brand" href="/folders"
           hx-get="/folders" hx-target="#main-content" hx-push-url="true">StudyHelper</a>
        <div class="d-flex align-items-center gap-3">
            <span class="nav-user" th:text="'Signed in as ' + ${username}"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="sh-btn-outline-white">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<!-- Layout fragment: scripts -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/app.js"></script>
</div>

</html>
