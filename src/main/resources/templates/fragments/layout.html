<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- Layout fragment: shared head -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' — StudyHelper'">StudyHelper</title>
    <meta name="description" content="StudyHelper — A flashcard study application">
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/color-picker.css" rel="stylesheet">
    <link href="/css/image-editor.css" rel="stylesheet">
    <link href="/css/quiz.css" rel="stylesheet">
    <link href="/css/exam.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSRF Meta Tags -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.dataset.theme = t;
        })();
    </script>
</head>

<!-- Layout fragment: top navigation bar -->
<nav th:fragment="topnav" class="app-topnav">
    <div class="topnav-inner">
        <a href="/dashboard" class="topnav-brand"
           hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
            <span class="topnav-brand-icon">
                <iconify-icon icon="lucide:book-open"></iconify-icon>
            </span>
            <span class="topnav-brand-name">StudyHelper</span>
        </a>

        <div class="topnav-links">
            <a href="/dashboard" class="topnav-link"
               hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:layout-dashboard"></iconify-icon>
                Dashboard
            </a>
            <a href="/study/start" class="topnav-link"
               hx-get="/study/start" hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:book-open"></iconify-icon>
                Study Session
            </a>
            <a href="/exams" class="topnav-link"
               hx-get="/exams" hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:clipboard-list"></iconify-icon>
                Past Exams
            </a>
        </div>

        <div class="topnav-right">
            <span class="topnav-user">
                <iconify-icon icon="lucide:user"></iconify-icon>
                <span th:text="${username}">User</span>
            </span>
            <button class="sh-btn sh-btn-ghost sh-btn-icon topnav-theme-btn" type="button" onclick="toggleTheme()" title="Toggle theme">
                <iconify-icon icon="lucide:sun" class="theme-icon-light"></iconify-icon>
                <iconify-icon icon="lucide:moon" class="theme-icon-dark"></iconify-icon>
            </button>
            <form th:action="@{/logout}" method="post" style="display:contents;">
                <button type="submit" class="sh-btn sh-btn-ghost sh-btn-sm topnav-logout-btn">
                    <iconify-icon icon="lucide:log-out"></iconify-icon>
                    Sign out
                </button>
            </form>
        </div>

        <button id="topnav-folders-btn" class="sh-btn sh-btn-ghost sh-btn-sm topnav-folders-btn" type="button" title="Show folders">
            <iconify-icon icon="lucide:folder"></iconify-icon>
            <span>Folders</span>
        </button>

        <button id="topnav-menu-btn" class="sh-btn sh-btn-ghost sh-btn-icon topnav-mobile-toggle" type="button">
            <iconify-icon icon="lucide:menu"></iconify-icon>
        </button>
    </div>

    <div class="topnav-mobile-menu" id="topnav-mobile-menu">
        <a href="/dashboard" class="topnav-mobile-link"
           hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
            <iconify-icon icon="lucide:layout-dashboard"></iconify-icon>
            Dashboard
        </a>
        <a href="/study/start" class="topnav-mobile-link"
           hx-get="/study/start" hx-target="#explorer-detail" hx-push-url="true">
            <iconify-icon icon="lucide:book-open"></iconify-icon>
            Study Session
        </a>
        <a href="/exams" class="topnav-mobile-link"
           hx-get="/exams" hx-target="#explorer-detail" hx-push-url="true">
            <iconify-icon icon="lucide:clipboard-list"></iconify-icon>
            Past Exams
        </a>
        <div class="topnav-mobile-divider"></div>
        <span class="topnav-mobile-user">
            <iconify-icon icon="lucide:user"></iconify-icon>
            <span th:text="${username}">User</span>
        </span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="topnav-mobile-link">
                <iconify-icon icon="lucide:log-out"></iconify-icon>
                Sign out
            </button>
        </form>
        <button class="topnav-mobile-link" type="button" onclick="toggleTheme()">
            <iconify-icon icon="lucide:sun" class="theme-icon-light"></iconify-icon>
            <iconify-icon icon="lucide:moon" class="theme-icon-dark"></iconify-icon>
            Toggle theme
        </button>
    </div>
</nav>

<!-- Layout fragment: scripts -->
<div th:fragment="scripts">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/lib/fabric.min.js"></script>
    <script src="/js/color-picker.js"></script>
    <script src="/js/image-editor.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/study-wizard.js"></script>
    <script src="/js/exam.js"></script>
    <div th:replace="~{fragments/color-picker :: popover}"></div>
    <div th:replace="~{fragments/image-editor :: modal}"></div>
    <div th:replace="~{fragments/lightbox :: lightbox}"></div>
    <div th:replace="~{fragments/exam-grading :: exam-grading-loader}"></div>
    <div th:replace="~{fragments/dialog :: dialog}"></div>
    <div id="sh-sidebar-backdrop" class="sh-sidebar-backdrop" aria-hidden="true"></div>
</div>

</html>
