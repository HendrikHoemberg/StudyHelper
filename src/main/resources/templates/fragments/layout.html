<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- Layout fragment: shared head -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' — StudyHelper'">StudyHelper</title>
    <meta name="description" content="StudyHelper — A flashcard study application">
    <meta name="theme-color" content="#0f766e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="StudyHelper">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/color-picker.css" rel="stylesheet">
    <link href="/css/image-editor.css" rel="stylesheet">
    <link href="/css/pdf-viewer.css" rel="stylesheet">
    <link href="/css/pdf-splitter.css" rel="stylesheet">
    <link href="/css/quiz.css" rel="stylesheet">
    <link href="/css/exam.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSRF Meta Tags -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.dataset.theme = t;
        })();
    </script>
</head>

<!-- Layout fragment: top navigation bar -->
<nav th:fragment="topnav" class="app-topnav">
    <div class="topnav-inner">
        <a href="/dashboard" class="topnav-brand"
           hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
            <img src="/icons/icon-192.png" alt="" class="topnav-brand-logo">
            <span class="topnav-brand-name">StudyHelper</span>
        </a>

        <div class="topnav-links">
            <a href="/dashboard" class="topnav-link"
               hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:layout-dashboard"></iconify-icon>
                Dashboard
            </a>
            <a href="/study/start" class="topnav-link"
               hx-get="/study/start" hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:book-open"></iconify-icon>
                Study Session
            </a>
            <a href="/flashcards/generate" class="topnav-link"
               hx-get="/flashcards/generate" hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:sparkles"></iconify-icon>
                AI Flashcards
            </a>
            <a href="/exams" class="topnav-link"
               hx-get="/exams" hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:clipboard-list"></iconify-icon>
                Past Exams
            </a>
            <a th:if="${isAdmin}" href="/admin" class="topnav-link">
                <iconify-icon icon="lucide:shield"></iconify-icon>
                Admin
            </a>
        </div>

        <div class="topnav-right">
            <div id="quota-desktop" class="topnav-quotas" th:if="${userQuota != null}">
                <div class="topnav-quota" th:title="'Storage: ' + ${userQuota.storageLabel()}">
                    <div class="topnav-quota-label">
                        <span>Storage</span>
                        <strong th:text="${userQuota.storageLabel()}">512 MB / 1.0 GB</strong>
                    </div>
                    <div class="topnav-quota-progress">
                        <div class="topnav-quota-bar"
                             th:classappend="${userQuota.storageStateClass()}"
                             th:style="'width:' + ${userQuota.storagePercent()} + '%'"></div>
                    </div>
                </div>
                <div class="topnav-quota" th:title="'AI today: ' + ${userQuota.aiLabel()}">
                    <div class="topnav-quota-label">
                        <span>AI</span>
                        <strong th:text="${userQuota.aiLabel()}">7 / 10</strong>
                    </div>
                    <div class="topnav-quota-progress">
                        <div class="topnav-quota-bar"
                             th:classappend="${userQuota.aiStateClass()}"
                             th:style="'width:' + ${userQuota.aiPercent()} + '%'"></div>
                    </div>
                </div>
            </div>
            <span class="topnav-user">
                <iconify-icon icon="lucide:user"></iconify-icon>
                <span th:text="${username}">User</span>
            </span>
            <button class="sh-btn sh-btn-ghost sh-btn-icon topnav-theme-btn" type="button" onclick="toggleTheme()" title="Toggle theme">
                <iconify-icon icon="lucide:sun" class="theme-icon-light"></iconify-icon>
                <iconify-icon icon="lucide:moon" class="theme-icon-dark"></iconify-icon>
            </button>
            <form th:action="@{/logout}" method="post" style="display:contents;">
                <button type="submit" class="sh-btn sh-btn-ghost sh-btn-sm topnav-logout-btn">
                    <iconify-icon icon="lucide:log-out"></iconify-icon>
                    Sign out
                </button>
            </form>
        </div>

        <button id="topnav-folders-btn" class="sh-btn sh-btn-ghost sh-btn-sm topnav-folders-btn" type="button" title="Show folders">
            <iconify-icon icon="lucide:folder"></iconify-icon>
            <span>Folders</span>
        </button>

        <button id="topnav-menu-btn" class="sh-btn sh-btn-ghost sh-btn-icon topnav-mobile-toggle" type="button">
            <iconify-icon icon="lucide:menu"></iconify-icon>
        </button>
    </div>
</nav>

<!-- Mobile side drawer for nav links (lives outside <nav> to escape its stacking context) -->
<div th:fragment="topnav-drawer" class="topnav-mobile-menu" id="topnav-mobile-menu">
    <a href="/dashboard" class="topnav-mobile-link"
       hx-get="/dashboard" hx-target="#explorer-detail" hx-push-url="true">
        <iconify-icon icon="lucide:layout-dashboard"></iconify-icon>
        Dashboard
    </a>
    <a href="/study/start" class="topnav-mobile-link"
       hx-get="/study/start" hx-target="#explorer-detail" hx-push-url="true">
        <iconify-icon icon="lucide:book-open"></iconify-icon>
        Study Session
    </a>
    <a href="/flashcards/generate" class="topnav-mobile-link"
       hx-get="/flashcards/generate" hx-target="#explorer-detail" hx-push-url="true">
        <iconify-icon icon="lucide:sparkles"></iconify-icon>
        AI Flashcards
    </a>
    <a href="/exams" class="topnav-mobile-link"
       hx-get="/exams" hx-target="#explorer-detail" hx-push-url="true">
        <iconify-icon icon="lucide:clipboard-list"></iconify-icon>
        Past Exams
    </a>
    <a th:if="${isAdmin}" href="/admin" class="topnav-mobile-link">
        <iconify-icon icon="lucide:shield"></iconify-icon>
        Admin
    </a>
    <div class="topnav-mobile-divider"></div>
    <div id="quota-mobile" class="topnav-mobile-quotas" th:if="${userQuota != null}">
        <div class="topnav-mobile-quota">
            <div class="topnav-quota-label">
                <span>Storage</span>
                <strong th:text="${userQuota.storageLabel()}">512 MB / 1.0 GB</strong>
            </div>
            <div class="topnav-quota-progress">
                <div class="topnav-quota-bar"
                     th:classappend="${userQuota.storageStateClass()}"
                     th:style="'width:' + ${userQuota.storagePercent()} + '%'"></div>
            </div>
        </div>
        <div class="topnav-mobile-quota">
            <div class="topnav-quota-label">
                <span>AI today</span>
                <strong th:text="${userQuota.aiLabel()}">7 / 10</strong>
            </div>
            <div class="topnav-quota-progress">
                <div class="topnav-quota-bar"
                     th:classappend="${userQuota.aiStateClass()}"
                     th:style="'width:' + ${userQuota.aiPercent()} + '%'"></div>
            </div>
        </div>
    </div>
    <div class="topnav-mobile-divider" th:if="${userQuota != null}"></div>
    <span class="topnav-mobile-user">
        <iconify-icon icon="lucide:user"></iconify-icon>
        <span th:text="${username}">User</span>
    </span>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="topnav-mobile-link">
            <iconify-icon icon="lucide:log-out"></iconify-icon>
            Sign out
        </button>
    </form>
    <button class="topnav-mobile-link" type="button" onclick="toggleTheme()">
        <iconify-icon icon="lucide:sun" class="theme-icon-light"></iconify-icon>
        <iconify-icon icon="lucide:moon" class="theme-icon-dark"></iconify-icon>
        Toggle theme
    </button>
</div>

<!-- Layout fragment: scripts -->
<div th:fragment="scripts">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/lib/fabric.min.js"></script>
    <script src="/js/color-picker.js"></script>
    <script src="/js/image-editor.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/study-wizard.js"></script>
    <script src="/js/exam.js"></script>
    <script type="module" src="/js/pdf-viewer.js"></script>
    <script type="module" src="/js/pdf-splitter.js"></script>
    <div th:replace="~{fragments/color-picker :: popover}"></div>
    <div th:replace="~{fragments/image-editor :: modal}"></div>
    <div th:replace="~{fragments/lightbox :: lightbox}"></div>
    <div th:replace="~{fragments/pdf-viewer :: modal}"></div>
    <div th:replace="~{fragments/pdf-splitter :: modal}"></div>
    <div th:replace="~{fragments/exam-grading :: exam-grading-loader}"></div>
    <div th:replace="~{fragments/dialog :: dialog}"></div>
    <div class="refresh-quota-trigger"
         hx-get="/api/quota"
         hx-trigger="refresh-quota from:body"
         hx-swap="none"></div>
    <div id="sh-sidebar-backdrop" class="sh-sidebar-backdrop" aria-hidden="true"></div>
    <div th:replace="~{fragments/layout :: topnav-drawer}"></div>
</div>

</html>
