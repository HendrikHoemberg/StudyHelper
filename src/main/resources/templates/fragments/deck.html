<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Fragment: deck detail view (swapped into #main-content) -->
<div th:fragment="deckDetail" class="sh-fade-in">
    <!-- Sidebar OOB refresh (rendered when refreshSidebar flag is set on mutation responses) -->
    <th:block th:if="${refreshSidebar}">
        <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    </th:block>

    <div th:if="${successMessage}" class="sh-alert sh-alert-success">
        <div class="sh-alert-body" th:text="${successMessage}"></div>
        <button type="button" class="sh-alert-close" hx-on:click="this.closest('.sh-alert').remove()">
            <iconify-icon icon="lucide:x"></iconify-icon>
        </button>
    </div>

    <!-- Breadcrumb -->
    <ul class="sh-breadcrumb">
        <li>
            <a href="/dashboard" hx-get="/dashboard" hx-target="#explorer-detail"
               hx-push-url="true">Dashboard</a>
        </li>
        <li class="sh-breadcrumb-sep">/</li>
        <li>
                <a th:href="@{/folders/{id}(id=${deck.folder.id}, tab='folders')}"
                    hx-get th:hx-get="@{/folders/{id}(id=${deck.folder.id}, tab='folders')}"
                    hx-target="#explorer-detail" hx-push-url="true"
                    th:text="${deck.folder.name}">Parent Folder</a>
        </li>
        <li class="sh-breadcrumb-sep">/</li>
        <li class="sh-breadcrumb-current" th:text="${deck.name}">Deck</li>
    </ul>

    <!-- Deck header -->
    <div class="sh-page-header">
        <div class="flex items-center gap-3">
            <div class="sh-deck-icon" th:style="'--folder-color:' + ${deck.colorHex != null ? deck.colorHex : (deck.folder.colorHex != null ? deck.folder.colorHex : defaultColorHex)}">
                <iconify-icon th:attr="icon=${(deck.iconName ?: 'layers').contains(':') ? (deck.iconName ?: 'layers') : 'lucide:' + (deck.iconName ?: 'layers')}"></iconify-icon>
            </div>
            <div>
                <h1 class="sh-page-title" th:text="${deck.name}">Deck Name</h1>
                <span class="sh-badge sh-badge-primary mt-1"
                      th:text="${deck.flashcards.size()} + ' cards'"></span>
            </div>
        </div>
        <div class="sh-page-actions">
            <a class="sh-btn sh-btn-primary sh-btn-sm"
               th:href="@{'/study/start'(deckId=${deck.id})}"
               hx-get="/study/start" th:hx-vals="${'{&quot;deckId&quot;: ' + deck.id + '}'}"
               hx-target="#explorer-detail" hx-push-url="true">
                <iconify-icon icon="lucide:play"></iconify-icon>
                Study
            </a>
            <button class="sh-btn sh-btn-secondary sh-btn-sm"
                    th:hx-get="@{/decks/{id}/flashcards/new(id=${deck.id})}"
                    hx-target="#modal-placeholder">
                <iconify-icon icon="lucide:plus"></iconify-icon>
                Add Card
            </button>
            <button class="sh-btn sh-btn-secondary sh-btn-sm"
                    th:hx-get="@{/decks/{id}/rename(id=${deck.id})}"
                    hx-target="#modal-placeholder">
                <iconify-icon icon="lucide:pencil"></iconify-icon>
                Rename
            </button>
            <form th:action="@{/decks/{id}/delete(id=${deck.id})}" method="post" style="display:inline;"
                  hx-post th:hx-post="@{/decks/{id}/delete(id=${deck.id})}"
                  hx-target="#explorer-detail"
                  hx-confirm="Delete this deck and all its flashcards? This action cannot be undone.">
                <button type="submit" class="sh-btn sh-btn-danger sh-btn-sm">
                    <iconify-icon icon="lucide:trash-2"></iconify-icon>
                    Delete
                </button>
            </form>
        </div>
    </div>

    <!-- Flashcard list -->
    <div th:fragment="flashcardList" id="flashcard-list">
        <!-- Flashcard grid -->
        <div class="sh-flashcard-grid">
            <div th:each="card : ${flashcards}" class="sh-flashcard">
                <div class="sh-flashcard-actions">
                    <button class="sh-btn sh-btn-ghost sh-btn-icon sh-btn-sm"
                            th:hx-get="@{/flashcards/{id}/edit(id=${card.id})}"
                            hx-target="#modal-placeholder">
                        <iconify-icon icon="lucide:pencil"></iconify-icon>
                    </button>
                    <form th:action="@{/flashcards/{id}/delete(id=${card.id})}" method="post" style="display:inline;"
                          hx-post th:hx-post="@{/flashcards/{id}/delete(id=${card.id})}"
                          hx-target="#flashcard-list"
                          hx-confirm="Delete this flashcard?">
                        <input type="hidden" name="deckId" th:value="${deck.id}">
                        <button type="submit" class="sh-btn sh-btn-ghost sh-btn-icon sh-btn-sm"
                                style="color:var(--danger);">
                            <iconify-icon icon="lucide:trash-2"></iconify-icon>
                        </button>
                    </form>
                </div>
                <div class="sh-flashcard-front">
                    <div class="sh-flashcard-label">
                        Front
                        <iconify-icon th:if="${card.frontImageFilename != null}" icon="lucide:image" class="sh-flashcard-img-badge" title="Has image"></iconify-icon>
                    </div>
                    <div class="sh-flashcard-text" th:text="${card.frontText}">Question</div>
                </div>
                <div>
                    <div class="sh-flashcard-label">
                        Back
                        <iconify-icon th:if="${card.backImageFilename != null}" icon="lucide:image" class="sh-flashcard-img-badge" title="Has image"></iconify-icon>
                    </div>
                    <div class="sh-flashcard-text" th:text="${card.backText}">Answer</div>
                </div>
            </div>

            <!-- Add Card Placeholder -->
            <div class="sh-flashcard sh-flashcard-add"
                 th:hx-get="@{/decks/{id}/flashcards/new(id=${deck.id})}"
                 hx-target="#modal-placeholder">
                <iconify-icon icon="lucide:plus"></iconify-icon>
                <span class="sh-flashcard-label">Add Card</span>
            </div>
        </div>
    </div>

    </div>

</body>
</html>
