<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Fragment: deck detail view (swapped into #main-content) -->
<div th:fragment="deckDetail" class="sh-fade-in">

    <!-- Breadcrumb -->
    <ul class="sh-breadcrumb">
        <li>
            <a href="/folders" hx-get="/folders" hx-target="#explorer-detail"
               hx-select=".sh-explorer-detail-content" hx-push-url="true">My Folders</a>
        </li>
        <li class="sh-breadcrumb-sep"><i data-lucide="chevron-right"></i></li>
        <li>
                <a th:href="@{/folders/{id}(id=${deck.folder.id})}"
                    hx-get th:hx-get="@{/folders/{id}(id=${deck.folder.id})}"
                    hx-target="#explorer-detail" hx-push-url="true"
                    th:text="${deck.folder.name}">Parent Folder</a>
        </li>
        <li class="sh-breadcrumb-sep"><i data-lucide="chevron-right"></i></li>
        <li class="sh-breadcrumb-current" th:text="${deck.name}">Deck</li>
    </ul>

    <!-- Deck header -->
    <div class="sh-page-header">
        <div class="flex items-center gap-3">
            <div class="sh-deck-icon">
                <i data-lucide="layers"></i>
            </div>
            <div>
                <h1 class="sh-page-title" th:text="${deck.name}">Deck Name</h1>
                <span class="sh-badge sh-badge-primary mt-1"
                      th:text="${deck.flashcards.size()} + ' cards'"></span>
            </div>
        </div>
        <div class="sh-page-actions">
            <a class="sh-btn sh-btn-primary sh-btn-sm"
               th:href="@{/decks/{id}/study/start(id=${deck.id})}"
               hx-get th:hx-get="@{/decks/{id}/study/start(id=${deck.id})}"
               hx-target="#main-content" hx-push-url="true">
                <i data-lucide="play"></i>
                Start Study
            </a>
            <button class="sh-btn sh-btn-secondary sh-btn-sm" data-modal-open="newCardModal">
                <i data-lucide="plus"></i>
                Add Card
            </button>
            <button class="sh-btn sh-btn-secondary sh-btn-sm" data-modal-open="renameDeckModal">
                <i data-lucide="pencil"></i>
                Rename
            </button>
            <form th:action="@{/decks/{id}/delete(id=${deck.id})}" method="post" style="display:inline;">
                <button type="submit" class="sh-btn sh-btn-danger sh-btn-sm"
                        data-confirm="Delete this deck and all its flashcards?">
                    <i data-lucide="trash-2"></i>
                    Delete
                </button>
            </form>
        </div>
    </div>

    <!-- Flashcard list -->
    <div th:fragment="flashcardList" id="flashcard-list">
        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(flashcards)}" class="sh-card">
            <div class="sh-card-body">
                <div class="sh-empty" style="padding:1.5rem;">
                    <div class="sh-empty-icon">
                        <i data-lucide="file-text"></i>
                    </div>
                    <p class="sh-empty-text">No flashcards yet</p>
                    <p class="sh-empty-hint">Add your first card to start studying.</p>
                </div>
            </div>
        </div>

        <!-- Flashcard grid -->
        <div th:if="${!#lists.isEmpty(flashcards)}" class="sh-flashcard-grid">
            <div th:each="card : ${flashcards}" class="sh-flashcard">
                <div class="sh-flashcard-actions">
                    <button class="sh-btn sh-btn-ghost sh-btn-icon sh-btn-sm"
                            th:data-card-id="${card.id}"
                            th:data-front="${card.frontText}"
                            th:data-back="${card.backText}"
                            onclick="openEditCard(this)">
                        <i data-lucide="pencil"></i>
                    </button>
                    <form th:action="@{/flashcards/{id}/delete(id=${card.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="deckId" th:value="${deck.id}">
                        <button type="submit" class="sh-btn sh-btn-ghost sh-btn-icon sh-btn-sm"
                                style="color:var(--danger);"
                                data-confirm="Delete this flashcard?">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </form>
                </div>
                <div class="sh-flashcard-front">
                    <div class="sh-flashcard-label">Front</div>
                    <div class="sh-flashcard-text" th:text="${card.frontText}">Question</div>
                </div>
                <div>
                    <div class="sh-flashcard-label">Back</div>
                    <div class="sh-flashcard-text" th:text="${card.backText}">Answer</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Card Modal -->
    <div class="sh-modal" id="newCardModal">
        <div class="sh-modal-backdrop"></div>
        <div class="sh-modal-dialog">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title">New Flashcard</h5>
                    <button type="button" class="sh-modal-close" data-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form th:action="@{/decks/{id}/flashcards(id=${deck.id})}" method="post">
                    <div class="sh-modal-body">
                        <div>
                            <label class="sh-label">Front (Question)</label>
                            <textarea name="frontText" class="sh-input" rows="3" required
                                      placeholder="Enter the question or prompt..."></textarea>
                        </div>
                        <div>
                            <label class="sh-label">Back (Answer)</label>
                            <textarea name="backText" class="sh-input" rows="3" required
                                      placeholder="Enter the answer..."></textarea>
                        </div>
                    </div>
                    <div class="sh-modal-footer">
                        <button type="button" class="sh-btn sh-btn-secondary" data-modal-close>Cancel</button>
                        <button type="submit" class="sh-btn sh-btn-primary">Add Card</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Rename Deck Modal -->
    <div class="sh-modal" id="renameDeckModal">
        <div class="sh-modal-backdrop"></div>
        <div class="sh-modal-dialog sh-modal-dialog-sm">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title">Rename Deck</h5>
                    <button type="button" class="sh-modal-close" data-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form th:action="@{/decks/{id}/rename(id=${deck.id})}" method="post">
                    <div class="sh-modal-body">
                        <div>
                            <label class="sh-label">Deck Name</label>
                            <input type="text" name="name" class="sh-input" required
                                   th:value="${deck.name}">
                        </div>
                    </div>
                    <div class="sh-modal-footer">
                        <button type="button" class="sh-btn sh-btn-secondary" data-modal-close>Cancel</button>
                        <button type="submit" class="sh-btn sh-btn-primary">Rename</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Card Modal -->
    <div class="sh-modal" id="editCardModal">
        <div class="sh-modal-backdrop"></div>
        <div class="sh-modal-dialog">
            <div class="sh-modal-content">
                <div class="sh-modal-header">
                    <h5 class="sh-modal-title">Edit Flashcard</h5>
                    <button type="button" class="sh-modal-close" data-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form id="editCardForm" method="post">
                    <input type="hidden" name="deckId" th:value="${deck.id}">
                    <div class="sh-modal-body">
                        <div>
                            <label class="sh-label">Front (Question)</label>
                            <textarea name="frontText" id="editFrontText" class="sh-input" rows="3" required></textarea>
                        </div>
                        <div>
                            <label class="sh-label">Back (Answer)</label>
                            <textarea name="backText" id="editBackText" class="sh-input" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="sh-modal-footer">
                        <button type="button" class="sh-btn sh-btn-secondary" data-modal-close>Cancel</button>
                        <button type="submit" class="sh-btn sh-btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    function openEditCard(btn) {
        const cardId = btn.dataset.cardId;
        const front = btn.dataset.front;
        const back = btn.dataset.back;
        document.getElementById('editFrontText').value = front;
        document.getElementById('editBackText').value = back;
        document.getElementById('editCardForm').action = '/flashcards/' + cardId + '/edit';
        openModal('editCardModal');
    }
</script>

</body>
</html>
