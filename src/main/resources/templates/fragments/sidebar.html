<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<aside th:fragment="sidebar" id="sidebar-aside" hx-swap-oob="true" class="sh-dashboard-sidebar">
    <div class="sh-sidebar-card">
        <div class="sh-sidebar-header">
            <div class="sh-sidebar-title">Folders</div>
            <button class="sh-btn sh-btn-ghost sh-btn-icon" hx-get="/folders/new" hx-target="#modal-placeholder" title="New folder">
                <iconify-icon icon="lucide:plus"></iconify-icon>
            </button>
        </div>
        <div th:if="${#lists.isEmpty(sidebarTree)}" class="sh-sidebar-empty">
            No folders yet
        </div>
        <ul th:if="${!#lists.isEmpty(sidebarTree)}" class="sh-d-folders">
            <li th:each="folder : ${sidebarTree}"
                class="sh-d-folder"
                th:classappend="(${!#lists.isEmpty(folder.children)} ? ' has-children' : '') + (${folder.isOpen} ? ' is-open' : '') + (${folder.isActive} ? ' is-active' : '')"
                th:data-folder-id="${folder.id}"
                th:style="'--folder-color:' + ${folder.colorHex}">
                <div class="sh-d-pill">
                    <button type="button" class="sh-d-pill-cap"
                            th:if="${!#lists.isEmpty(folder.children)}"
                            hx-on:click="this.closest('.sh-d-folder').classList.toggle('is-open')"
                            title="Expand / collapse">
                        <iconify-icon th:attr="icon=${folder.iconName.contains(':') ? folder.iconName : 'lucide:' + (folder.iconName ?: 'folder')}" class="sh-d-cap-icon-closed"></iconify-icon>
                        <iconify-icon th:attr="icon=${folder.iconName.contains(':') ? folder.iconName : 'lucide:' + (folder.iconName ?: 'folder')}" class="sh-d-cap-icon-open"></iconify-icon>
                    </button>
                    <span th:if="${#lists.isEmpty(folder.children)}" class="sh-d-pill-cap sh-d-pill-cap-static">
                        <iconify-icon th:attr="icon=${folder.iconName.contains(':') ? folder.iconName : 'lucide:' + (folder.iconName ?: 'folder')}"></iconify-icon>
                    </span>
                    <a th:href="@{/folders/{id}(id=${folder.id})}"
                       class="sh-d-pill-name"
                       hx-get th:hx-get="@{/folders/{id}(id=${folder.id})}"
                       hx-target="#explorer-detail" hx-push-url="true">
                        <span class="sh-d-pill-text" th:text="${folder.name}">Folder</span>
                        <span class="sh-d-pill-count" th:text="${folder.deckCount}">0</span>
                    </a>
                </div>
                <div th:if="${!#lists.isEmpty(folder.children)}" class="sh-d-children">
                    <span class="sh-d-rail"></span>
                    <a th:each="child : ${folder.children}"
                       th:href="@{/folders/{id}(id=${child.id})}"
                       class="sh-d-row"
                       th:classappend="${child.isActive} ? 'is-active' : ''"
                       th:data-folder-id="${child.id}"
                       th:style="'--folder-color:' + ${child.colorHex}"
                       hx-get th:hx-get="@{/folders/{id}(id=${child.id})}"
                       hx-target="#explorer-detail" hx-push-url="true">
                        <span class="sh-d-row-dot"></span>
                        <span class="sh-d-row-name" th:text="${child.name}">Subfolder</span>
                        <span class="sh-d-row-count" th:text="${child.deckCount}">0</span>
                    </a>
                </div>
            </li>
        </ul>
    </div>
</aside>

</body>
</html>
