<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="quizQuestion" id="quiz-session-content" class="sh-fade-in sh-study-session-active">

    <!-- Progress bar -->
    <div class="sh-study-progress-wrap mb-4">
        <div class="sh-study-progress-label">
            Question <span th:text="${questionNumber}">1</span> of <span th:text="${totalQuestions}">5</span>
        </div>
        <div class="sh-study-progress-bar-bg">
            <div class="sh-study-progress-bar"
                 th:style="'width:' + ${totalQuestions > 0 ? (questionNumber * 100.0 / totalQuestions) : 0} + '%'"></div>
        </div>
    </div>

    <!-- Question card -->
    <div class="sh-card mb-3">
        <div class="sh-card-body">
            <div class="sh-flashcard-label mb-2">Question</div>
            <p class="sh-quiz-question-text" th:text="${currentQuestion.questionText}">Question text</p>
        </div>
    </div>

    <!-- Options: clickable form when unanswered -->
    <form th:if="${!answered}"
          method="post"
          hx-post="/quiz/answer"
          hx-target="#quiz-session-content"
          hx-swap="outerHTML swap:300ms"
          hx-disabled-elt="find button">
        <div class="sh-quiz-options">
            <button th:each="option, iter : ${currentQuestion.options}"
                    type="submit"
                    name="selectedOption"
                    th:value="${iter.index}"
                    class="sh-quiz-option">
                <span class="sh-quiz-option-letter" th:text="${{'A','B','C','D'}[iter.index]}">A</span>
                <span class="sh-quiz-option-text" th:text="${option}">Option text</span>
            </button>
        </div>
    </form>

    <!-- Options: highlighted when answered -->
    <div th:unless="${!answered}" class="sh-quiz-options">
        <div th:each="option, iter : ${currentQuestion.options}"
             th:with="isCorrect=${iter.index == currentQuestion.correctOptionIndex},
                       isSelected=${iter.index == selectedOption}"
             th:class="${'sh-quiz-option sh-quiz-option--disabled'
                         + (isCorrect ? ' sh-quiz-option--correct'
                            : (isSelected ? ' sh-quiz-option--wrong'
                               : ' sh-quiz-option--neutral'))}">
            <span class="sh-quiz-option-letter" th:text="${{'A','B','C','D'}[iter.index]}">A</span>
            <span class="sh-quiz-option-text" th:text="${option}">Option text</span>
            <iconify-icon th:if="${isCorrect}" icon="lucide:check-circle" class="sh-quiz-option-result-icon sh-quiz-result-correct"></iconify-icon>
            <iconify-icon th:if="${isSelected and !isCorrect}" icon="lucide:x-circle" class="sh-quiz-option-result-icon sh-quiz-result-wrong"></iconify-icon>
        </div>
    </div>

    <!-- Feedback + next button (shown after answering) -->
    <div th:if="${answered}" class="sh-quiz-feedback">
        <div th:if="${selectedOption == currentQuestion.correctOptionIndex}"
             class="sh-alert sh-alert-success">
            <iconify-icon icon="lucide:check-circle"></iconify-icon>
            Correct!
        </div>
        <div th:unless="${selectedOption == currentQuestion.correctOptionIndex}"
             class="sh-alert sh-alert-danger">
            <iconify-icon icon="lucide:x-circle"></iconify-icon>
            Incorrect.
        </div>
        <div class="sh-quiz-feedback-actions">
            <a th:if="${questionNumber < totalQuestions}"
               hx-get="/quiz/next"
               hx-target="#quiz-session-content"
               hx-swap="outerHTML swap:300ms"
               hx-disabled-elt="this"
               class="sh-btn sh-btn-primary"
               style="cursor:pointer;">
                Next Question <iconify-icon icon="lucide:arrow-right"></iconify-icon>
            </a>
            <a th:if="${questionNumber >= totalQuestions}"
               hx-get="/quiz/next"
               hx-target="#quiz-session-content"
               hx-swap="outerHTML swap:300ms"
               hx-disabled-elt="this"
               class="sh-btn sh-btn-primary"
               style="cursor:pointer;">
                <iconify-icon icon="lucide:flag"></iconify-icon> View Results
            </a>
        </div>
    </div>

</div>

</body>
</html>
