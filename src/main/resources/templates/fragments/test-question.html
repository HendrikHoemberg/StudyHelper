<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:fragment="testQuestion" id="test-session-content" class="sh-fade-in sh-study-session-active">

    <!-- Progress bar -->
    <div class="sh-study-progress-wrap mb-4">
        <div class="sh-study-progress-label">
            Question <span th:text="${questionNumber}">1</span> of <span th:text="${totalQuestions}">5</span>
        </div>
        <div class="sh-study-progress-bar-bg">
            <div class="sh-study-progress-bar"
                 th:style="'width:' + ${totalQuestions > 0 ? (questionNumber * 100.0 / totalQuestions) : 0} + '%'"></div>
        </div>
    </div>

    <!-- Question card -->
    <div class="sh-card mb-3">
        <div class="sh-card-body">
            <div class="sh-flashcard-label mb-2">Question</div>
            <p class="sh-test-question-text" th:text="${currentQuestion.questionText}">Question text</p>
        </div>
    </div>

    <!-- Options: clickable form when unanswered -->
    <form th:if="${!answered}"
          method="post"
          hx-post="/test/answer"
          hx-target="#test-session-content"
          hx-swap="outerHTML swap:300ms">
        <div class="sh-test-options">
            <button th:each="option, iter : ${currentQuestion.options}"
                    type="submit"
                    name="selectedOption"
                    th:value="${iter.index}"
                    class="sh-test-option">
                <span class="sh-test-option-letter" th:text="${{'A','B','C','D'}[iter.index]}">A</span>
                <span class="sh-test-option-text" th:text="${option}">Option text</span>
            </button>
        </div>
    </form>

    <!-- Options: highlighted when answered -->
    <div th:unless="${!answered}" class="sh-test-options">
        <div th:each="option, iter : ${currentQuestion.options}"
             th:with="isCorrect=${iter.index == currentQuestion.correctOptionIndex},
                      isSelected=${iter.index == selectedOption}"
             th:class="${'sh-test-option sh-test-option--disabled'
                         + (isCorrect ? ' sh-test-option--correct'
                            : (isSelected ? ' sh-test-option--wrong'
                               : ' sh-test-option--neutral'))}">
            <span class="sh-test-option-letter" th:text="${{'A','B','C','D'}[iter.index]}">A</span>
            <span class="sh-test-option-text" th:text="${option}">Option text</span>
            <i th:if="${isCorrect}" data-lucide="check-circle"
               class="sh-test-option-result-icon sh-test-result-correct"></i>
            <i th:if="${isSelected and !isCorrect}" data-lucide="x-circle"
               class="sh-test-option-result-icon sh-test-result-wrong"></i>
        </div>
    </div>

    <!-- Feedback + next button (shown after answering) -->
    <div th:if="${answered}" class="sh-test-feedback">
        <div th:if="${selectedOption == currentQuestion.correctOptionIndex}"
             class="sh-alert sh-alert-success">
            <i data-lucide="check-circle"></i>
            Correct!
        </div>
        <div th:unless="${selectedOption == currentQuestion.correctOptionIndex}"
             class="sh-alert sh-alert-danger">
            <i data-lucide="x-circle"></i>
            Incorrect.
        </div>
        <div class="sh-test-feedback-actions">
            <a th:if="${questionNumber < totalQuestions}"
               hx-get="/test/next"
               hx-target="#test-session-content"
               hx-swap="outerHTML swap:300ms"
               class="sh-btn sh-btn-primary"
               style="cursor:pointer;">
                Next Question <i data-lucide="arrow-right"></i>
            </a>
            <a th:if="${questionNumber >= totalQuestions}"
               hx-get="/test/next"
               hx-target="#test-session-content"
               hx-swap="outerHTML swap:300ms"
               class="sh-btn sh-btn-primary"
               style="cursor:pointer;">
                <i data-lucide="flag"></i> View Results
            </a>
        </div>
    </div>

</div>

</body>
</html>
