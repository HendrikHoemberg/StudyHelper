<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="editOptionsModal" class="sh-modal is-open" id="file-options-modal"
     th:with="lastDot=${file.originalFilename.lastIndexOf('.')}, 
              hasDot=${lastDot > 0},
              baseName=${hasDot ? file.originalFilename.substring(0, lastDot) : file.originalFilename}, 
              extension=${hasDot ? file.originalFilename.substring(lastDot) : ''}">
    <div class="sh-modal-backdrop" onclick="this.closest('.sh-modal').remove()"></div>
    <div class="sh-modal-dialog sh-modal-dialog-sm">
        <div class="sh-modal-content">
            <div class="sh-modal-header">
                <h5 class="sh-modal-title">Edit File</h5>
                <button type="button" class="sh-modal-close" onclick="this.closest('.sh-modal').remove()">
                    <iconify-icon icon="lucide:x"></iconify-icon>
                </button>
            </div>
            
            <div class="sh-modal-body">
                <!-- Rename Section -->
                <form th:action="@{/files/{id}/rename(id=${file.id})}" method="post" 
                      hx-post th:hx-post="@{/files/{id}/rename(id=${file.id})}"
                      hx-target="#explorer-detail"
                      hx-on::after-request="if(event.detail.successful) this.closest('.sh-modal').remove()">
                    <div class="mb-3">
                        <label class="sh-label">File Name</label>
                        <div class="flex items-stretch shadow-sm rounded-lg overflow-hidden border border-[var(--border-light)] focus-within:ring-2 focus-within:ring-[var(--accent-primary)] focus-within:border-[var(--accent-primary)] transition-all">
                            <input type="text" id="filename-base-input" 
                                   class="sh-input border-none shadow-none flex-grow focus:ring-0" 
                                   required 
                                   th:value="${file.originalFilename}"
                                   placeholder="Filename">
                         </div>
                        <input type="hidden" name="name" id="filename-full-input" th:value="${file.originalFilename}">
                    </div>
                    <div class="mt-1">
                        <button type="submit" class="sh-btn sh-btn-primary w-full justify-center">
                            <iconify-icon icon="lucide:check"></iconify-icon>
                            Save Name
                        </button>
                    </div>
                </form>

                <hr th:if="${#strings.startsWith(file.mimeType, 'image/')}" 
                    style="margin: 0.75rem 0; border: none; border-top: 1px solid var(--border-light);">

                <!-- Image Editor Section -->
                <div th:if="${#strings.startsWith(file.mimeType, 'image/')}">
                    <label class="sh-label mb-2">Image Content</label>
                    <button class="sh-btn sh-btn-secondary w-full justify-center"
                            th:attr="data-edit-image=${file.id},
                                     data-edit-url=@{/files/{id}/view(id=${file.id})},
                                     data-edit-folder=${file.folder.id},
                                     data-edit-filename=${file.originalFilename}"
                            onclick="this.closest('.sh-modal').remove()">
                        <iconify-icon icon="lucide:image"></iconify-icon>
                        Open Image Editor
                    </button>
                </div>

                <hr th:if="${file.mimeType == 'application/pdf'}"
                    style="margin: 0.75rem 0; border: none; border-top: 1px solid var(--border-light);">

                <!-- PDF Splitter Section -->
                <div th:if="${file.mimeType == 'application/pdf'}">
                    <label class="sh-label mb-2">PDF Tools</label>
                    <button type="button" class="sh-btn sh-btn-secondary w-full justify-center"
                            th:attr="data-split-file-id=${file.id},
                                     data-split-url=@{/files/{id}/view(id=${file.id})},
                                     data-split-filename=${file.originalFilename}"
                            onclick="this.closest('.sh-modal').remove()">
                        <iconify-icon icon="lucide:scissors"></iconify-icon>
                        Open PDF Splitter
                    </button>
                </div>
            </div>
            
            <div class="sh-modal-footer flex justify-between items-center">
                <button type="button" class="sh-btn sh-btn-danger"
                        hx-post th:hx-post="@{/files/{id}/delete(id=${file.id})}"
                        hx-target="#explorer-detail"
                        hx-confirm="Are you sure you want to delete this file?"
                        hx-on::after-request="if(event.detail.successful) this.closest('.sh-modal').remove()">
                    <iconify-icon icon="lucide:trash-2"></iconify-icon>
                    Delete
                </button>
                <button type="button" class="sh-btn sh-btn-secondary" onclick="this.closest('.sh-modal').remove()">Close</button>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
        (function() {
            initLucide();
            var baseInput = document.getElementById('filename-base-input');
            var fullInput = document.getElementById('filename-full-input');
            
            if (baseInput && fullInput) {
                baseInput.focus();
                baseInput.select();
                
                baseInput.addEventListener('input', function() {
                    fullInput.value = baseInput.value;
                });
            }
        })();
    </script>
</div>

</body>
</html>
