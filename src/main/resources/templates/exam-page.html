<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam | StudyHelper</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/exam.css}">
    <script th:src="@{/js/exam.js}" defer></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="sh-body">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="sh-main-content">
        <div id="exam-runtime-wrapper" class="sh-container py-4">
            <!-- This container will be swapped by HTMX for questions/grading/results -->
            <div th:if="${state.config().layout().name() == 'PER_PAGE'}" 
                 th:replace="~{fragments/exam-question :: exam-question}"></div>
            
            <div th:if="${state.config().layout().name() == 'SINGLE_PAGE'}" 
                 th:replace="~{fragments/exam-single-page :: exam-single-page}"></div>
        </div>
    </main>

    <div th:replace="~{fragments/exam-grading :: exam-grading-loader}"></div>
</body>
</html>
