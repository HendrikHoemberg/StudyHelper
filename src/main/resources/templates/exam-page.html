<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Exam')}"></head>
<body>

<div class="app-layout">
    <nav th:replace="~{fragments/layout :: topnav}"></nav>
    <div id="main-content" class="app-main-content">
        <div class="sh-fade-in">
            <div class="sh-dashboard-shell">
                <div class="sh-explorer-shell">
                    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
                    <div id="explorer-detail" class="sh-explorer-detail sh-explorer-detail-content">
                        <div id="exam-runtime-wrapper" class="sh-container py-4">
                            <!-- This container will be swapped by HTMX for questions/grading/results -->
                            <div th:if="${state.config().layout().name() == 'PER_PAGE'}" 
                                 th:replace="~{fragments/exam-question :: exam-question}"></div>
                            
                            <div th:if="${state.config().layout().name() == 'SINGLE_PAGE'}" 
                                 th:replace="~{fragments/exam-single-page :: exam-single-page}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal-placeholder"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
