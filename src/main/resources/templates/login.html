<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — StudyHelper</title>
    <meta name="description" content="Sign in to StudyHelper to access your flashcard decks and study materials.">
    <link href="/css/styles.css" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.dataset.theme = t;
        })();
    </script>
</head>
<body class="sh-login-bg">
    <div class="sh-login-card">
        <div class="sh-login-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        </div>
        <h1 class="sh-login-brand">StudyHelper</h1>
        <p class="sh-login-subtitle">Sign in to your account</p>

        <div th:if="${param.error}" class="sh-alert sh-alert-danger">
            <div class="sh-alert-body">Invalid username or password.</div>
        </div>
        <div th:if="${param.logout}" class="sh-alert sh-alert-info">
            <div class="sh-alert-body">You have been signed out.</div>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="sh-login-field">
                <label for="username" class="sh-label">Username</label>
                <input type="text" id="username" name="username" class="sh-input"
                       autocomplete="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="sh-login-field">
                <label for="password" class="sh-label">Password</label>
                <input type="password" id="password" name="password" class="sh-input"
                       autocomplete="current-password" required placeholder="Enter your password">
            </div>
            <div class="sh-login-submit">
                <button type="submit" class="sh-btn sh-btn-primary w-full justify-center">
                    Sign in
                </button>
            </div>
        </form>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
