<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — StudyHelper</title>
    <meta name="description" content="Sign in to StudyHelper to access your flashcard decks and study materials.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="sh-login-bg">
    <div class="sh-login-card">
        <h1 class="sh-login-brand">StudyHelper</h1>
        <p class="sh-login-subtitle">Sign in to your account</p>

        <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size:0.8125rem;">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert py-2" style="font-size:0.8125rem; background:var(--sh-border-light); color:var(--sh-text-secondary);">
            You have been signed out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="sh-label">Username</label>
                <input type="text" id="username" name="username" class="sh-input"
                       autocomplete="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="mb-4">
                <label for="password" class="sh-label">Password</label>
                <input type="password" id="password" name="password" class="sh-input"
                       autocomplete="current-password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="sh-btn sh-btn-primary" style="width:100%; justify-content:center;">
                Sign in
            </button>
        </form>
    </div>
</body>
</html>
