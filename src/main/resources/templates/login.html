<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — StudyHelper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .login-card { border: none; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <div class="card login-card">
            <div class="card-body p-4 p-md-5">
                <h4 class="card-title text-center fw-bold mb-1">StudyHelper</h4>
                <p class="text-center text-muted small mb-4">Sign in to your account</p>

                <div th:if="${param.error}" class="alert alert-danger py-2 small">
                    Invalid username or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-secondary py-2 small">
                    You have been signed out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-control"
                               autocomplete="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                               autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign in</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
