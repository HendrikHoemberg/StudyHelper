<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${view.folder.name} + ' — StudyHelper'">Folder — StudyHelper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .folder-card { border-left: 5px solid var(--folder-color); transition: box-shadow .15s; }
        .folder-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
        .file-row:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/folders">StudyHelper</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 small" th:text="'Signed in as ' + ${username}"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/folders">My Folders</a></li>
            <li th:each="crumb, stat : ${view.breadcrumb}"
                th:class="${stat.last} ? 'breadcrumb-item active' : 'breadcrumb-item'">
                <a th:if="!${stat.last}" th:href="@{/folders/{id}(id=${crumb.id})}"
                   th:text="${crumb.name}"></a>
                <span th:if="${stat.last}" th:text="${crumb.name}"></span>
            </li>
        </ol>
    </nav>

    <!-- Folder header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
            <span class="rounded-circle d-inline-block"
                  th:style="'width:18px;height:18px;background:' + ${view.folder.colorHex}"></span>
            <h4 class="m-0 fw-semibold" th:text="${view.folder.name}"></h4>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#newSubfolderModal">
                + Subfolder
            </button>
            <button class="btn btn-outline-danger btn-sm"
                    onclick="if(confirm('Delete this folder and all its contents?')) this.closest('form').submit()"
                    form="deleteFolderForm">
                Delete Folder
            </button>
            <form th:action="@{/folders/{id}/delete(id=${view.folder.id})}" method="post"
                  id="deleteFolderForm" class="d-none"></form>
        </div>
    </div>

    <!-- Subfolders -->
    <div th:if="${!#lists.isEmpty(view.subFolders)}" class="mb-4">
        <h6 class="text-muted text-uppercase small fw-semibold mb-2">Subfolders</h6>
        <div class="row g-2">
            <div th:each="sub : ${view.subFolders}" class="col-12 col-sm-6 col-md-4 col-lg-3">
                <a th:href="@{/folders/{id}(id=${sub.id})}" class="text-decoration-none text-dark">
                    <div class="card folder-card shadow-sm rounded-3 p-3"
                         th:style="'--folder-color:' + ${sub.colorHex}">
                        <div class="d-flex align-items-center gap-2">
                            <span class="rounded-circle d-inline-block flex-shrink-0"
                                  th:style="'width:12px;height:12px;background:' + ${sub.colorHex}"></span>
                            <span class="fw-semibold text-truncate small" th:text="${sub.name}"></span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Files section -->
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h6 class="m-0 fw-semibold">Files</h6>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#uploadModal">
                Upload File
            </button>
        </div>

        <!-- Empty files state -->
        <div th:if="${#lists.isEmpty(view.files)}" class="card-body text-center text-muted py-4">
            <p class="mb-0 small">No files in this folder yet. Upload one to get started.</p>
        </div>

        <!-- Files table -->
        <div th:if="${!#lists.isEmpty(view.files)}" class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">Name</th>
                        <th>Type</th>
                        <th>Size</th>
                        <th>Uploaded</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="file : ${view.files}" class="file-row align-middle">
                        <td class="ps-3 text-truncate" style="max-width:220px"
                            th:text="${file.originalFilename}"></td>
                        <td class="text-muted small" th:text="${file.mimeType}"></td>
                        <td class="text-muted small"
                            th:text="${#numbers.formatDecimal(file.fileSizeBytes / 1024.0, 1, 1) + ' KB'}"></td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(file.uploadedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td class="text-end pe-3">
                            <a th:href="@{/files/{id}/view(id=${file.id})}"
                               target="_blank" class="btn btn-outline-secondary btn-sm me-1">View</a>
                            <a th:href="@{/files/{id}/download(id=${file.id})}"
                               class="btn btn-outline-primary btn-sm me-1">Download</a>
                            <form th:action="@{/files/{id}/delete(id=${file.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Delete this file?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Upload File</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/folders/{id}/files(id=${view.folder.id})}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <input type="file" name="file" class="form-control" required>
                    <p class="text-muted small mt-2 mb-0">Maximum file size: 100 MB</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Upload</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- New Subfolder Modal -->
<div class="modal fade" id="newSubfolderModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">New Subfolder</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/folders/{id}/subfolders(id=${view.folder.id})}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" required autofocus>
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Color</label>
                        <input type="color" name="colorHex" class="form-control form-control-color w-100" value="#4c6ef5">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
