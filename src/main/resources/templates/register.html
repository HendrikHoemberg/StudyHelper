<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register — StudyHelper</title>
    <meta name="description" content="Create your StudyHelper account with an invite code.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap">
    <link href="/css/styles.css" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.dataset.theme = t;
        })();
    </script>
</head>
<body class="sh-login-bg">
    <div class="sh-login-card">
        <div class="sh-login-icon">
            <img src="/icons/icon-192.png" alt="" class="sh-login-logo">
        </div>
        <h1 class="sh-login-brand">StudyHelper</h1>
        <p class="sh-login-subtitle">Create your account</p>

        <div th:if="${errorMessage}" class="sh-alert sh-alert-danger">
            <div class="sh-alert-body" th:text="${errorMessage}"></div>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="sh-login-field">
                <label for="code" class="sh-label">Invite code</label>
                <input type="text" id="code" name="code" class="sh-input" required
                       autocomplete="off" placeholder="Enter your invite code" th:value="${code}">
            </div>
            <div class="sh-login-field">
                <label for="username" class="sh-label">Username</label>
                <input type="text" id="username" name="username" class="sh-input" required
                       autocomplete="username" placeholder="Choose a username" th:value="${username}">
            </div>
            <div class="sh-login-field">
                <label for="password" class="sh-label">Password</label>
                <input type="password" id="password" name="password" class="sh-input" required
                       autocomplete="new-password" placeholder="Choose a password">
            </div>
            <div class="sh-login-submit">
                <button type="submit" class="sh-btn sh-btn-primary w-full justify-center">
                    Create account
                </button>
            </div>
        </form>
        <p class="sh-login-subtitle" style="margin-top:1rem;">
            <a th:href="@{/login}">Back to sign in</a>
        </p>
    </div>
</body>
</html>
