<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home — StudyHelper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">StudyHelper</span>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small" th:text="'Signed in as ' + ${username}"></span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">Sign out</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card border-0 shadow-sm rounded-3 p-4">
            <h2 class="mb-1">Hello, <span th:text="${username}" class="text-primary"></span>!</h2>
            <p class="text-muted mb-0">Authentication is working. The database, security layer, and session are all live.</p>
        </div>
    </div>
</body>
</html>
