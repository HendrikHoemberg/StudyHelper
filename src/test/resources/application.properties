spring.datasource.url=jdbc:h2:mem:studyhelper;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

file.upload.dir=target/test-uploads

spring.ai.google.genai.api-key=test-key
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite-preview
spring.ai.retry.max-attempts=1

# Initial User Seeding (empty defaults for tests)
app.user1.username=
app.user1.password=
app.user2.username=
app.user2.password=
