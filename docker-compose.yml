services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studyhelper
      MYSQL_USER: studyhelper
      MYSQL_PASSWORD: studyhelper
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/studyhelper
      SPRING_DATASOURCE_USERNAME: studyhelper
      SPRING_DATASOURCE_PASSWORD: studyhelper
      FILE_UPLOAD_DIR: /app/uploads
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads:
